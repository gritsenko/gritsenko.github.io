    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

        :root {
            --bg-color: #fdf8fb;
            --bg-gradient: linear-gradient(135deg, #fdf8fb 0%, #eee3eb 100%);
            --board-bg: #2a2e54;
            --cell-bg: #383d6b;
            --text-color: #333;
            
            /* Цвета блоков из референса */
            --color-orange: #f58220;
            --color-blue: #35a0f0;
            --color-green: #66cc33;
            --color-purple: #b042ff;
            --color-yellow: #ffcc00;
            --color-red: #f03030;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            /* Затемняем основной фон всего окна */
            background: linear-gradient(rgba(10, 15, 30, 0.8), rgba(10, 15, 30, 0.8)), url('background.jpg') center/cover no-repeat fixed;
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none; /* Предотвращает скролл на мобильных */
        }

        .game-container {
            width: 100%;
            max-width: 430px; /* Размер типичного смартфона */
            height: 100%;
            max-height: 932px;
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
            position: relative;
            z-index: 1;
            overflow: hidden; /* Обрезаем края псевдоэлемента с размытием */
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6); /* Отделяем контейнер от темного фона */
            border-radius: 35px; /* Скругляем углы контейнера */
            background: url('background.jpg');           
        }

        .game-container.shake {
            animation: cameraShake 0.35s cubic-bezier(0.36, 0.07, 0.10, 0.37);
        }
       
        /* Легкое осветление контейнера для лучшей контрастности текста и игрового поля */
        .game-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.35);
            z-index: -1;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            min-height: 100px;
        }

        .settings-btn {
            width: 45px;
            height: 45px;
            background: #60a5fa;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 0 #3b82f6, inset 0 2px 4px rgba(255,255,255,0.4);
            cursor: pointer;
            z-index: 2;
        }

        .settings-btn svg {
            fill: white;
            width: 24px;
            height: 24px;
        }

        .title-container {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 1;
        }

        .logo-img {
            max-height: 100px;
            width: auto;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.3));
        }

        .stats-box {
            background: rgba(255, 255, 255, 0.5); /* Светлая плашка под статистику */
            padding: 8px 12px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 90px;
            z-index: 2;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #333; /* Темный текст для читаемости на светлом фоне */
        }

        .stat-icon {
            width: 18px;
            height: 18px;
        }

        .level-text {
            text-align: center;
            font-size: 26px;
            color: #222; /* Темный текст */
            margin: 0px 0 15px 0;
            font-weight: 800;
            text-shadow: 0 2px 5px rgba(255,255,255,0.7); /* Белое свечение для контраста */
        }

        /* Игровое поле */
        .board-container {
            background: var(--board-bg);
            border-radius: 12px;
            padding: 6px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.1);
            margin-bottom: 20px;
            position: relative;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 3px;
            aspect-ratio: 1 / 1;
            width: 100%;
        }

        .cell {
            background: var(--cell-bg);
            border-radius: 6px;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .cell.preview {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
        }

        .block-svg-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes cameraShake {
            0% { transform: translate3d(0, 0, 0) rotate(0deg); }
            20% { transform: translate3d(-7px, 4px, 0) rotate(-0.7deg); }
            40% { transform: translate3d(8px, -5px, 0) rotate(0.8deg); }
            60% { transform: translate3d(-6px, -3px, 0) rotate(-0.5deg); }
            80% { transform: translate3d(5px, 4px, 0) rotate(0.4deg); }
            100% { transform: translate3d(0, 0, 0) rotate(0deg); }
        }

        /* Трей (панель с фигурами) */
        .tray {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .tray-slot {
            flex: 1;
            aspect-ratio: 1 / 1;
            background: rgba(30, 35, 60, 0.35); /* Прозрачность уменьшена почти в 2 раза */
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.5); /* Глубокая тень внутри слота */
        }

        /* Формы фигур */
        .shape {
            display: grid;
            gap: 3px;
            pointer-events: none; /* Важно для драг-н-дропа */
        }

        .shape .block {
            width: 100%;
            height: 100%;
        }

        .shape .block.empty {
            visibility: hidden;
        }

        /* Клонированная фигура при перетаскивании */
        .drag-clone {
            position: fixed;
            z-index: 1000;
            pointer-events: none;
            transition: transform 0.1s;
        }

        /* Нижние кнопки */
        .bottom-controls {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: auto;
            padding-bottom: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px 0;
            border-radius: 25px;
            border: none;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.15), inset 0 2px 4px rgba(255,255,255,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.15), inset 0 2px 4px rgba(255,255,255,0.3);
        }

        .btn-blue { background: #60a5fa; box-shadow: 0 5px 0 #3b82f6; }
        .btn-blue:active { box-shadow: 0 2px 0 #3b82f6; }
        
        .btn-yellow { background: #fbbf24; box-shadow: 0 5px 0 #d97706; color: #854d0e; }
        .btn-yellow:active { box-shadow: 0 2px 0 #d97706; }

        .btn:disabled {
            cursor: default;
            opacity: 0.55;
            transform: none;
            box-shadow: 0 5px 0 rgba(0,0,0,0.08), inset 0 2px 4px rgba(255,255,255,0.2);
        }

        .btn-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Анимации уничтожения */
        .clearing {
            animation: blast 0.3s forwards;
            z-index: 10;
        }

        @keyframes blast {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(2); }
            100% { transform: scale(0); opacity: 0; }
        }

        /* Плавающий текст комбо */
        .combo-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: 900;
            color: #fbbf24;
            -webkit-text-stroke: 1px #fff;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }

        .combo-text.fade-out {
            opacity: 0 !important;
            transform: translate(-50%, -80%) scale(0.8) !important;
        }

        @keyframes popCombo {
            0% { transform: translate(-50%, -30%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* Экран Game Over */
        #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #game-over.show {
            visibility: visible;
            opacity: 1;
        }

        #game-over h2 {
            color: white;
            font-size: 40px;
            margin-bottom: 10px;
        }

        .game-over-stats {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 0 0 24px;
            text-align: center;
            color: white;
        }

        .game-over-stats strong {
            font-size: 30px;
            color: #facc15;
        }
        
        .restart-btn {
            flex: none; /* Убираем растягивание от базового класса .btn */
            padding: 20px 70px;
            font-size: 20px;
            border-radius: 30px;
            height: auto;
        }

        /* Частицы для взрыва */
        .particle {
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 3px;
            pointer-events: none;
            z-index: 150;
            animation: explode 0.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes explode {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot)); opacity: 0; }
        }

        /* Частицы для приземления */
        .landing-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1; /* Под фигурой */
            animation: landing 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes landing {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.6; }
            100% { transform: translate(var(--tx), var(--ty)) scale(2); opacity: 0; }
        }

        /* Всплывающие очки */
        .score-popup {
            position: absolute;
            font-size: 36px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 1000;
            animation: scoreFloat 1s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        @keyframes scoreFloat {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            30% { transform: translate(-50%, -100%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -180%) scale(1); opacity: 0; }
        }

        /* Хвалебные надписи */
        .praise-popup {
            position: absolute;
            font-size: 32px;
            font-weight: 900;
            color: #fbbf24;
            -webkit-text-stroke: 1.5px #fff;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6));
            pointer-events: none;
            z-index: 1001;
            animation: praisePop 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes praisePop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; rotate: -10deg; }
            20% { transform: translate(-50%, -120%) scale(1.4); opacity: 1; rotate: 5deg; }
            40% { transform: translate(-50%, -120%) scale(1.2); opacity: 1; rotate: -5deg; }
            100% { transform: translate(-50%, -250%) scale(1); opacity: 0; rotate: 0deg; }
        }

        /* ===== RESPONSIVE: Narrow / phone screens ===== */
        @media (max-width: 430px) {
            body {
                height: 100svh; /* Динамическая высота viewport для iOS */
            }
            .game-container {
                border-radius: 0;
                box-shadow: none;
                max-height: 100svh; /* dynamic viewport height (notch-safe) */
            }
        }

        /* ===== RESPONSIVE: Square / wide screens ===== */
        @media (min-aspect-ratio: 1 / 1) {
            body {
                padding: 12px 0;
            }
            .game-container {
                width: min(100%, 430px, max(300px, calc(100svh - 320px)));
                max-height: 780px;
                padding: 10px 12px 12px;
            }
            .header {
                min-height: 68px;
                margin-bottom: 10px;
            }
            .logo-img {
                max-height: 72px;
            }
            .level-text {
                margin-bottom: 10px;
                font-size: 22px;
            }
            .board-container {
                margin-bottom: 10px;
            }
            .tray {
                margin-bottom: 10px;
            }
            .bottom-controls {
                gap: 8px;
                padding-bottom: 4px;
            }
            .btn {
                padding: 14px 25px;
                font-size: 18px;
                gap: 4px;
            }
            .btn-icon {
                width: 20px;
                height: 20px;
            }
        }

        /* ===== RESPONSIVE: Short screens — компактный хедер со счётом ===== */
        @media (max-height: 750px) {
            .game-container {
                padding: 8px 12px;
            }
            .header {
                min-height: 55px;
                margin-bottom: 8px;
            }
            /* Прячем логотип */
            .title-container {
                display: none;
            }
            /* Текущий счёт перекрывает область логотипа */
            .level-text {
                position: absolute;
                top: 8px;
                left: 0;
                right: 0;
                height: 55px;
                margin: 0;
                font-size: 26px;
                display: flex;
                align-items: center;
                justify-content: center;
                pointer-events: none;
                z-index: 1;
            }
            .board-container {
                margin-bottom: 10px;
            }
            .tray {
                margin-bottom: 10px;
            }
            .bottom-controls {
                gap: 8px;
                padding-bottom: 15px;
            }
            .btn {
                padding: 14px 25px;
                font-size: 18px;
            }
        }

        /* ===== SPLASH SCREEN ===== */
        .splash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2a2e54e4 0%, #1a1e3fde 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            gap: 40px;
            font-family: 'Nunito', sans-serif;
        }

        .splash-overlay.hidden {
            display: none;
        }

        .splash-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            text-align: center;
        }

        .splash-logo {
            max-width: 200px;
            width: 80%;
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.4));
        }

        .splash-title {
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            margin: 0;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            letter-spacing: -1px;
        }

        .splash-version {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin: 0;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .splash-play-btn {
            background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3), inset 0 -2px 0 rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Nunito', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .splash-play-btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3), inset 0 -1px 0 rgba(0, 0, 0, 0.2);
        }

        .splash-play-btn:hover {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        }

        /* ===== RESPONSIVE: Very short screens — всё в видимой области ===== */
        @media (max-height: 620px) {
            body {
                height: 100svh;
            }
            .game-container {
                width: min(100%, calc(100svh - 110px));
                max-width: 380px;
                max-height: 100svh;
                padding: 5px 10px;
            }
            .header {
                min-height: 44px;
                margin-bottom: 5px;
            }
            .level-text {
                top: 5px;
                height: 44px;
                font-size: 20px;
            }
            .settings-btn {
                width: 38px;
                height: 38px;
            }
            .stats-box {
                padding: 5px 8px;
                gap: 3px;
            }
            .stat-row {
                font-size: 12px;
                gap: 5px;
            }
            .stat-icon {
                width: 14px;
                height: 14px;
            }
            .tray {
                margin-bottom: 4px;
            }
            .board-container {
                margin-bottom: 4px;
            }
            .bottom-controls {
                gap: 6px;
                padding-bottom: 2px;
            }
            .btn {
                padding: 5px 0;
                font-size: 11px;
                gap: 3px;
            }
            .btn-icon {
                width: 18px;
                height: 18px;
            }
        }

    </style>
</head>
<body>

<div class="splash-overlay" id="splash-overlay">
    <div class="splash-content">
        <img src="logo.png" alt="Block Chpok" class="splash-logo">
        <div>

        </div>
        <button class="splash-play-btn" id="splash-play-btn">Играть</button>

</div>

<div class="game-container">

<script>
    // --- AUDIO MANAGER (Web Audio API) ---
    class AudioManager {
        constructor() {
            this.audioContext = null;
            this.buffers = {};
            this.isInitialized = false;
            this.soundConfigs = {
                'pick': { file: 'pick.mp3', volume: 0.4 },
                'click': { file: 'click.mp3', volume: 0.3 },
                'pop': { file: 'pop1.mp3', volume: 0.5 },
                'line': { file: 'line.mp3', volume: 0.6 },
                'hardPop': { file: 'hard_pop.mp3', volume: 0.7 }
            };
        }

        async init() {
            if (this.isInitialized) return;
            
            try {
                // Создаем AudioContext при первом взаимодействии пользователя
                if (!this.audioContext) {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }

                // Загружаем все звуки параллельно
                const loadPromises = Object.entries(this.soundConfigs).map(([key, config]) => {
                    return this.loadSound(key, config.file);
                });

                await Promise.all(loadPromises);
                this.isInitialized = true;
            } catch (e) {
                console.warn('Audio initialization failed:', e);
            }
        }

        async loadSound(name, fileName) {
            try {
                const response = await fetch(fileName);
                const arrayBuffer = await response.arrayBuffer();
                this.buffers[name] = await this.audioContext.decodeAudioData(arrayBuffer);
            } catch (e) {
                console.warn(`Failed to load sound ${name}:`, e);
            }
        }

        play(soundName) {
            // Если еще не инициализировано - запускаем инициализацию
            if (!this.isInitialized) {
                this.init().catch(() => {});
                return; // Пропускаем первый звук, остальные сработают
            }

            if (!this.buffers[soundName]) return;

            try {
                // Возобновляем контекст если нужно (на iOS это иногда требуется)
                if (this.audioContext && this.audioContext.state === 'suspended') {
                    this.audioContext.resume();
                }

                const buffer = this.buffers[soundName];
                const config = this.soundConfigs[soundName];
                const source = this.audioContext.createBufferSource();
                const gainNode = this.audioContext.createGain();

                source.buffer = buffer;
                gainNode.gain.value = config.volume;

                source.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                source.start(0);
            } catch (e) {
                console.warn(`Failed to play sound ${soundName}:`, e);
            }
        }
    }

    const audioManager = new AudioManager();

    // --- HAPTIC FEEDBACK SYSTEM ---
    const supportsHaptics = typeof window === "undefined"
        ? false
        : window.matchMedia("(pointer: coarse)").matches;

    function _haptic() {
        try {
            if (navigator.vibrate) {
                navigator.vibrate(50);
                return;
            }

            if (!supportsHaptics) return;

            const labelEl = document.createElement("label");
            labelEl.ariaHidden = "true";
            labelEl.style.display = "none";

            const inputEl = document.createElement("input");
            inputEl.type = "checkbox";
            inputEl.setAttribute("switch", "");
            labelEl.appendChild(inputEl);

            document.head.appendChild(labelEl);
            labelEl.click();
            document.head.removeChild(labelEl);
        } catch {
            // do nothing
        }
    }

    _haptic.confirm = () => {
        if (navigator.vibrate) {
            navigator.vibrate([50, 70, 50]);
            return;
        }

        _haptic();
        setTimeout(() => _haptic(), 120);
    };

    _haptic.error = () => {
        if (navigator.vibrate) {
            navigator.vibrate([50, 70, 50, 70, 50]);
            return;
        }

        _haptic();
        setTimeout(() => _haptic(), 120);
        setTimeout(() => _haptic(), 240);
    };

    const haptic = _haptic;

    // --- НАСТРОЙКИ И ДАННЫЕ ---
    const BOARD_SIZE = 8;
    const BEST_SCORE_KEY = 'block-chpok-best-score';
    const COLORS = {
        orange: 'var(--color-orange)',
        blue: 'var(--color-blue)',
        green: 'var(--color-green)',
        purple: 'var(--color-purple)',
        yellow: 'var(--color-yellow)',
        red: 'var(--color-red)'
    };

    // Все возможные фигуры
    const SHAPES_DATA = [
        { matrix: [[1]], color: COLORS.yellow }, // 1x1
        { matrix: [[1,1],[1,1]], color: COLORS.blue }, // 2x2
        { matrix: [[1,1,1],[1,1,1],[1,1,1]], color: COLORS.red }, // 3x3
        { matrix: [[1,1]], color: COLORS.green }, // h2
        { matrix: [[1],[1]], color: COLORS.green }, // v2
        { matrix: [[1,1,1]], color: COLORS.orange }, // h3
        { matrix: [[1],[1],[1]], color: COLORS.orange }, // v3
        { matrix: [[1,1,1,1]], color: COLORS.blue }, // h4
        { matrix: [[1],[1],[1],[1]], color: COLORS.blue }, // v4
        { matrix: [[1,1,1,1,1]], color: COLORS.purple }, // h5
        { matrix: [[1],[1],[1],[1],[1]], color: COLORS.purple }, // v5
        { matrix: [[1,0],[1,1]], color: COLORS.orange }, // L small
        { matrix: [[0,1],[1,1]], color: COLORS.orange },
        { matrix: [[1,1],[1,0]], color: COLORS.orange },
        { matrix: [[1,1],[0,1]], color: COLORS.orange },
        { matrix: [[1,0,0],[1,0,0],[1,1,1]], color: COLORS.purple }, // L large
        { matrix: [[0,0,1],[0,0,1],[1,1,1]], color: COLORS.purple },
        { matrix: [[1,1,1],[1,0,0],[1,0,0]], color: COLORS.purple },
        { matrix: [[1,1,1],[0,0,1],[0,0,1]], color: COLORS.purple },
        { matrix: [[1,1,1],[0,1,0]], color: COLORS.green }, // T shape
        { matrix: [[0,1,0],[1,1,1]], color: COLORS.green },
        { matrix: [[1,0],[1,1],[1,0]], color: COLORS.green },
        { matrix: [[0,1],[1,1],[0,1]], color: COLORS.green },
    ];

    // --- СОСТОЯНИЕ ИГРЫ ---
    let board = [];
    let trayPieces = [null, null, null];
    let score = 0;
    let bestScore = 0;
    let displayedScore = 0;
    let scoreAnimationToken = 0;
    let refillTimeoutIds = [];
    let gameOverTimeoutId = null;
    let isRefillingTray = false;

    // Элементы DOM
    const gameContainer = document.querySelector('.game-container');
    const boardEl = document.getElementById('board');
    const traySlots = [
        document.getElementById('slot-0'),
        document.getElementById('slot-1'),
        document.getElementById('slot-2')
    ];
    const scoreEl = document.getElementById('score');
    const bestScoreEl = document.getElementById('best-score');
    const comboDisplay = document.getElementById('combo-display');
    const gameOverScreen = document.getElementById('game-over');
    const gameOverScoreEl = document.getElementById('game-over-score');
    const gameOverBestEl = document.getElementById('game-over-best');

    function playSound(soundName) {
        audioManager.play(soundName);
    }

    // Переменные для перетаскивания
    let dragElement = null;
    let dragPieceIndex = -1;
    let dragOffsetX = 0;
    let dragOffsetY = 0;
    let cellSize = 0;
    let gapSize = 3;
    let isDragging = false;
    let isAnimating = false; // Блокировка интерфейса во время цепной анимации

    // Палитры для каждого цвета блока (светлый/темный/центр/обводки), основанные на вашем фиолетовом референсе
    const BLOCK_PALETTES = {
        'var(--color-orange)': { light: '#FFD5A3', dark: '#E36500', centerL: '#FFB347', centerD: '#F58220', strokeL: '#FFDFB5', strokeD: '#FFB347', outline: '#4A1D00' },
        'var(--color-blue)': { light: '#9EE0FF', dark: '#1E75E0', centerL: '#60BFFF', centerD: '#35A0F0', strokeL: '#B5EAFF', strokeD: '#60BFFF', outline: '#072454' },
        'var(--color-green)': { light: '#C3F79C', dark: '#43AB14', centerL: '#82E0AA', centerD: '#66CC33', strokeL: '#D1FAAF', strokeD: '#82E0AA', outline: '#113303' },
        'var(--color-purple)': { light: '#F2A8F7', dark: '#7228A5', centerL: '#D175E2', centerD: '#A251DC', strokeL: '#F8A9FA', strokeD: '#D579E8', outline: '#301B54' },
        'var(--color-yellow)': { light: '#FFF29C', dark: '#EBB000', centerL: '#F7DC6F', centerD: '#FFCC00', strokeL: '#FFF5B0', strokeD: '#F7DC6F', outline: '#593A00' },
        'var(--color-red)': { light: '#FFA8A8', dark: '#CC1414', centerL: '#F1948A', centerD: '#F03030', strokeL: '#FFBCBC', strokeD: '#F1948A', outline: '#420303' }
    };

    function cloneBoardState(sourceBoard) {
        return sourceBoard.map(row => row.slice());
    }

    function cloneShape(shape) {
        if (!shape) return null;
        return {
            matrix: shape.matrix.map(row => row.slice()),
            color: shape.color
        };
    }

    function cloneTrayState(sourceTray) {
        return sourceTray.map(piece => cloneShape(piece));
    }

    function clearPendingRefill() {
        refillTimeoutIds.forEach(id => clearTimeout(id));
        refillTimeoutIds = [];
        isRefillingTray = false;
    }

    function clearPendingGameOver() {
        if (gameOverTimeoutId !== null) {
            clearTimeout(gameOverTimeoutId);
            gameOverTimeoutId = null;
        }
    }

    function loadBestScore() {
        try {
            const savedValue = window.localStorage.getItem(BEST_SCORE_KEY);
            const parsedValue = Number(savedValue);
            bestScore = Number.isFinite(parsedValue) && parsedValue > 0 ? parsedValue : 0;
        } catch (error) {
            bestScore = 0;
        }
        updateBestScoreDisplay();
    }

    function saveBestScore(nextBestScore) {
        bestScore = nextBestScore;
        try {
            window.localStorage.setItem(BEST_SCORE_KEY, String(bestScore));
        } catch (error) {
            // Игнорируем недоступный storage и просто обновляем UI.
        }
        updateBestScoreDisplay();
    }

    function updateBestScoreDisplay() {
        const formattedBestScore = bestScore.toLocaleString('en-US');
        bestScoreEl.textContent = formattedBestScore;
        gameOverBestEl.textContent = formattedBestScore;
    }

    function isThreeByThreeSquare(shape) {
        return Boolean(shape)
            && shape.matrix.length === 3
            && shape.matrix[0].length === 3
            && shape.matrix.every(row => row.every(cell => cell === 1));
    }

    function triggerCameraShake() {
        gameContainer.classList.remove('shake');
        void gameContainer.offsetWidth;
        gameContainer.classList.add('shake');
    }

    function finalizeBestScore() {
        if (score > bestScore) {
            saveBestScore(score);
        } else {
            updateBestScoreDisplay();
        }
    }

    function showGameOver() {
        finalizeBestScore();
        gameOverScoreEl.textContent = score.toLocaleString('en-US');
        // Haptic feedback on game over
        haptic.error();
        gameOverScreen.classList.add('show');
    }

    // --- ГЕНЕРАЦИЯ SVG БЛОКА ---
    // Создаем максимально реалистичный 3D блок на основе вашего SVG
    function getBlockSVG(colorStr) {
        // Генерируем уникальный ID для каждого блока, чтобы избежать проблемы с кэшированием градиентов в WebKit
        const uid = Math.random().toString(36).substring(2, 9);
        const id = colorStr.replace(/[^a-zA-Z0-9]/g, '') + '_' + uid;
        const pal = BLOCK_PALETTES[colorStr] || BLOCK_PALETTES['var(--color-purple)']; // фоллбэк на фиолетовый

        return `
        <svg viewBox="0 0 68 68" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 1. Базовый фон с резким диагональным градиентом -->
            <rect width="68" height="68" rx="12" fill="url(#paint0_linear_${id})"/>
            
            <!-- 2. Отзеркаленный слой с прозрачностью для создания 4 граней -->
            <rect opacity="0.5" width="68" height="68" rx="12" transform="matrix(-1 0 0 1 68 0)" fill="url(#paint1_linear_${id})"/>
            
            <!-- 3. Центральная часть (фильтр убран для повышения производительности) -->
            <g>
                <rect x="10" y="10" width="48" height="48" rx="7" fill="url(#paint2_linear_${id})"/>
                <rect x="10" y="10" width="48" height="48" rx="7" stroke="url(#paint_inner_stroke_${id})" stroke-width="1.5"/>
            </g>
            
            <!-- 4. Темная обводка по контуру -->
            <rect x="1" y="1" width="66" height="66" rx="11" stroke="${pal.outline}" stroke-width="2"/>
            
            <!-- 5. Сложный кастомный блик в левом верхнем углу -->
            <path d="M16.8276 9.12817C17.5747 10.3664 16.1728 12.5815 13.6963 14.0757C11.2198 15.5699 8.60661 15.7774 7.8595 14.5392C10 10.5 6.52353 9.99422 9 8.5C11.4765 7.00578 16.0805 7.88993 16.8276 9.12817Z" fill="url(#paint3_radial_${id})"/>
            <path d="M16.8276 9.12817C17.5747 10.3664 16.1728 12.5815 13.6963 14.0757C11.2198 15.5699 8.60661 15.7774 7.8595 14.5392C10 10.5 6.52353 9.99422 9 8.5C11.4765 7.00578 16.0805 7.88993 16.8276 9.12817Z" fill="url(#paint4_radial_${id})"/>
            
            <defs>
                <!-- Градиент с резким переходом от 0.49 до 0.53 -->
                <linearGradient id="paint0_linear_${id}" x1="0" y1="0" x2="68" y2="68" gradientUnits="userSpaceOnUse">
                    <stop offset="0.490951" stop-color="${pal.light}"/>
                    <stop offset="0.5315" stop-color="${pal.dark}"/>
                </linearGradient>
                <linearGradient id="paint1_linear_${id}" x1="0" y1="0" x2="68" y2="68" gradientUnits="userSpaceOnUse">
                    <stop offset="0.490951" stop-color="${pal.light}"/>
                    <stop offset="0.5315" stop-color="${pal.dark}"/>
                </linearGradient>
                <linearGradient id="paint2_linear_${id}" x1="34" y1="10" x2="34" y2="58" gradientUnits="userSpaceOnUse">
                    <stop stop-color="${pal.centerL}"/>
                    <stop offset="1" stop-color="${pal.centerD}"/>
                </linearGradient>
                
                <!-- Градиент для внутренней рамки: светлый блик сверху, прозрачная середина, легкий рефлекс снизу -->
                <linearGradient id="paint_inner_stroke_${id}" x1="34" y1="10" x2="34" y2="58" gradientUnits="userSpaceOnUse">
                    <stop stop-color="${pal.strokeL}"/>
                    <stop offset="0.5" stop-color="${pal.centerD}" stop-opacity="0"/>
                    <stop offset="1" stop-color="${pal.strokeD}" stop-opacity="0.8"/>
                </linearGradient>
                
                <!-- Радиальные градиенты для блика -->
                <radialGradient id="paint3_radial_${id}" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(12.5 11.5) rotate(123.69) scale(1.80278 5.14854)">
                    <stop stop-color="white"/>
                    <stop offset="1" stop-color="white" stop-opacity="0"/>
                </radialGradient>
                <radialGradient id="paint4_radial_${id}" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(12.5 12) rotate(60.0391) scale(2.39553 4.79105)">
                    <stop stop-color="white"/>
                    <stop offset="1" stop-color="white" stop-opacity="0"/>
                </radialGradient>
            </defs>
        </svg>
        `;
    }

    // --- ИНИЦИАЛИЗАЦИЯ ---
    function initGame() {
        clearPendingRefill();
        clearPendingGameOver();
        if (dragElement) {
            dragElement.remove();
            dragElement = null;
        }
        gameContainer.classList.remove('shake');
        board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));
        trayPieces = [null, null, null];
        score = 0;
        displayedScore = 0;
        isAnimating = false;
        isDragging = false;
        dragPieceIndex = -1;
        updateScore();
        gameOverScreen.classList.remove('show');
        comboDisplay.style.animation = 'none';
        comboDisplay.classList.add('fade-out');
        boardEl.innerHTML = ''; // Очищаем поле для полного перезапуска
        renderBoard();
        fillTray();
    }

    // --- РЕНДЕРИНГ ---
    function renderBoard() {
        // Создаем пустую сетку только если она еще не создана (при старте/рестарте)
        if (boardEl.children.length === 0) {
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    boardEl.appendChild(cell);
                }
            }
        }

        // Обновляем только те клетки, которые изменились (чтобы избежать лишних анимаций)
        for (let r = 0; r < BOARD_SIZE; r++) {
            for (let c = 0; c < BOARD_SIZE; c++) {
                const cell = document.getElementById(`cell-${r}-${c}`);
                const currentColor = cell.dataset.color || null;
                const targetColor = board[r][c];

                // SELF-HEALING: Проверяем синхронизацию между логическим состоянием и DOM
                const hasChild = cell.children.length > 0;
                const shouldHaveChild = targetColor !== null;
                const logicalStateMatch = (currentColor === targetColor);
                const domStateMatch = (hasChild === shouldHaveChild);

                // Если логическое или физическое состояние не совпадает, принудительно перерисовываем
                if (!logicalStateMatch || !domStateMatch) {
                    cell.innerHTML = ''; // Очищаем старое содержимое
                    
                    if (targetColor) {
                        const blockCont = document.createElement('div');
                        blockCont.className = 'block-svg-container';
                        blockCont.innerHTML = getBlockSVG(targetColor);
                        cell.appendChild(blockCont);
                    }
                    
                    // Сохраняем текущий цвет в атрибут data-color
                    cell.dataset.color = targetColor || '';
                }
            }
        }
    }

    function createShapeHTML(shape) {
        const rows = shape.matrix.length;
        const cols = shape.matrix[0].length;
        
        let html = `<div class="shape" style="grid-template-columns: repeat(${cols}, 1fr); grid-template-rows: repeat(${rows}, 1fr); width: 100%; height: 100%;">`;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                if (shape.matrix[r][c]) {
                    html += `<div class="block" style="aspect-ratio: 1/1;">${getBlockSVG(shape.color)}</div>`;
                } else {
                    html += `<div class="block empty" style="aspect-ratio: 1/1;"></div>`;
                }
            }
        }
        html += `</div>`;
        return html;
    }

    function fillTray() {
        let emptyCount = 0;
        for (let i = 0; i < 3; i++) {
            if (!trayPieces[i]) {
                emptyCount++;
            }
        }
        
        // Заполняем только если все 3 пустые
        if (emptyCount === 3) {
            clearPendingRefill();
            isRefillingTray = true;
            renderTray(true); // Рендерим пустые слоты
            
            // Задержка перед началом появления новой партии блоков
            const refillStartTimeoutId = setTimeout(() => {
                for (let i = 0; i < 3; i++) {
                    const randomShape = SHAPES_DATA[Math.floor(Math.random() * SHAPES_DATA.length)];
                    
                    // Задержка появления и фигур, и частиц
                    const slotFillTimeoutId = setTimeout(() => {
                        trayPieces[i] = randomShape;
                        renderTray(); // Обновляем лоток, чтобы показать фигуру
                        
                        // Звук появления блока
                        playSound('click');
                        
                        const slot = traySlots[i];
                        if (slot) {
                            const rect = slot.getBoundingClientRect();
                            // Частицы в 3 раза больше (14 * 3 = 42)
                            createParticles(rect.left + rect.width / 2, rect.top + rect.height / 2, randomShape.color, 42);
                        }
                        
                        // После заполнения последнего слота проверяем возможность хода
                        if (i === 2) {
                            isRefillingTray = false;
                            refillTimeoutIds = [];
                            checkGameOver();
                        }
                    }, i * 150); 
                    refillTimeoutIds.push(slotFillTimeoutId);
                }
            }, 300);
            refillTimeoutIds.push(refillStartTimeoutId);
        } else {
            renderTray();
            checkGameOver();
        }
    }

    function renderTray(forceEmpty = false) {
        for (let i = 0; i < 3; i++) {
            const slot = traySlots[i];
            const piece = forceEmpty ? null : trayPieces[i];
            
            slot.innerHTML = '';
            slot.onpointerdown = null;
            
            if (piece) {
                const rows = piece.matrix.length;
                const cols = piece.matrix[0].length;
                const gap = 3;
                
                // Получаем реальные размеры слота. Fallback 100x140 на случай если DOM еще не отрендерился
                const slotW = slot.clientWidth || 100;
                const slotH = slot.clientHeight || 140;
                
                // Внутренние отступы слота, чтобы фигура не касалась краев (заполнение не на 100%)
                const paddingW = 24; // по 12px отступа слева и справа
                const paddingH = 24; // по 12px отступа сверху и снизу
                
                // Вычисляем максимально доступную область внутри слота
                const maxW = slotW - paddingW;
                const maxH = slotH - paddingH;
                
                // Рассчитываем максимально возможный размер ячейки как по ширине, так и по высоте
                // Учитываем формулу: Cell * Count + Gap * (Count - 1) <= MaxSize
                const maxCellW = (maxW - gap * (cols - 1)) / cols;
                const maxCellH = (maxH - gap * (rows - 1)) / rows;
                
                // Берем минимальное значение, чтобы фигура точно влезла в слот целиком без искажений
                let trayCellSize = Math.min(maxCellW, maxCellH);
                
                // Ограничиваем максимальный размер ячейки, чтобы 1x1 или 2x2 не были абсурдно гигантскими
                trayCellSize = Math.min(trayCellSize, 42);
                
                const container = document.createElement('div');
                container.innerHTML = createShapeHTML(piece);
                const shapeEl = container.firstElementChild;
                
                // Применяем вычисленные точные размеры к самой сетке фигуры
                const w = cols * trayCellSize + (cols - 1) * gap;
                const h = rows * trayCellSize + (rows - 1) * gap;
                
                shapeEl.style.width = `${w}px`;
                shapeEl.style.height = `${h}px`;
                shapeEl.style.transform = `none`; // scale больше не нужен
                
                slot.appendChild(shapeEl);
                
                // Добавляем обработчики событий
                slot.onpointerdown = (e) => startDrag(e, i);
            }
        }
    }

    // --- ЛОГИКА ПЕРЕТАСКИВАНИЯ ---
    function startDrag(e, index) {
        if (!trayPieces[index] || isDragging || isAnimating) return;

        // Воспроизводим звук клика/поднятия
        playSound('pick');
        
        e.preventDefault();
        isDragging = true;
        dragPieceIndex = index;
        
        const piece = trayPieces[index];
        const cellRect = document.querySelector('.cell').getBoundingClientRect();
        cellSize = cellRect.width;
        
        // Создаем клон для перетаскивания
        dragElement = document.createElement('div');
        dragElement.className = 'drag-clone';
        dragElement.innerHTML = createShapeHTML(piece);
        
        const shapeEl = dragElement.firstElementChild;
        // Задаем реальный размер блоков как на доске (фигура сразу приобретает масштаб игрового поля)
        shapeEl.style.width = `${piece.matrix[0].length * cellSize + (piece.matrix[0].length - 1) * gapSize}px`;
        shapeEl.style.height = `${piece.matrix.length * cellSize + (piece.matrix.length - 1) * gapSize}px`;
        
        document.body.appendChild(dragElement);
        
        // Прячем только саму фигуру, оставляя темную подложку слота видимой
        if (traySlots[index].firstElementChild) {
            traySlots[index].firstElementChild.style.opacity = '0';
        }

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        // Позиционируем клон так, чтобы центр фигуры был немного ВЫШЕ пальца
        dragOffsetX = shapeEl.offsetWidth / 2;
        dragOffsetY = shapeEl.offsetHeight + 40; // Смещение вверх на 40px

        moveDrag(clientX, clientY);

        document.addEventListener('pointermove', onDragMove, {passive: false});
        document.addEventListener('pointerup', endDrag);
    }

    function onDragMove(e) {
        if (!isDragging) return;
        e.preventDefault(); // Предотвращаем скролл
        moveDrag(e.clientX, e.clientY);
        updatePreview();
    }

    function moveDrag(x, y) {
        if (dragElement) {
            dragElement.style.left = `${x - dragOffsetX}px`;
            dragElement.style.top = `${y - dragOffsetY}px`;
        }
    }

    function updatePreview() {
        clearPreview();
        const coords = getBoardCoordinates();
        if (coords && canPlace(trayPieces[dragPieceIndex], coords.r, coords.c)) {
            drawPreview(trayPieces[dragPieceIndex], coords.r, coords.c);
        }
    }

    function getBoardCoordinates() {
        if (!dragElement) return null;
        
        const rect = dragElement.getBoundingClientRect();
        const boardRect = boardEl.getBoundingClientRect();
        
        // Вычисляем относительную позицию (левый верхний угол фигуры относительно доски)
        const relX = rect.left - boardRect.left;
        const relY = rect.top - boardRect.top;
        
        // Переводим в координаты сетки
        const c = Math.round(relX / (cellSize + gapSize));
        const r = Math.round(relY / (cellSize + gapSize));
        
        return {r, c};
    }

    function clearPreview() {
        document.querySelectorAll('.cell.preview').forEach(el => el.classList.remove('preview'));
    }

    function drawPreview(shape, startR, startC) {
        for (let r = 0; r < shape.matrix.length; r++) {
            for (let c = 0; c < shape.matrix[0].length; c++) {
                if (shape.matrix[r][c]) {
                    const cell = document.getElementById(`cell-${startR + r}-${startC + c}`);
                    if (cell) cell.classList.add('preview');
                }
            }
        }
    }

    async function endDrag(e) {
        if (!isDragging) return;
        
        document.removeEventListener('pointermove', onDragMove);
        document.removeEventListener('pointerup', endDrag);
        
        const coords = getBoardCoordinates();
        const piece = trayPieces[dragPieceIndex];
        
        const savedDragPieceIndex = dragPieceIndex;
        
        // Удаляем клон СРАЗУ при отпускании
        if (dragElement) {
            dragElement.remove();
            dragElement = null;
        }
        
        clearPreview();
        isDragging = false;
        dragPieceIndex = -1;
        
        if (coords && canPlace(piece, coords.r, coords.c)) {
            const blocksPlaced = placeShape(piece, coords.r, coords.c);
            trayPieces[savedDragPieceIndex] = null;

            // Haptic feedback on block drop
            haptic();

            // Рендерим доску СРАЗУ, чтобы новые блоки появились
            renderBoard();

            if (isThreeByThreeSquare(piece)) {
                triggerCameraShake();
                playSound('hardPop');
            }
            
            // Получаем координаты центра каждого блока фигуры на доске для эффекта приземления
            for (let r = 0; r < piece.matrix.length; r++) {
                for (let c = 0; c < piece.matrix[0].length; c++) {
                    if (piece.matrix[r][c]) {
                        const cellR = coords.r + r;
                        const cellC = coords.c + c;
                        const cell = document.getElementById(`cell-${cellR}-${cellC}`);
                        if (cell) {
                            const rect = cell.getBoundingClientRect();
                            createLandingParticles(rect.left + rect.width/2, rect.top + rect.height/2, piece.color);
                        }
                    }
                }
            }

            // Безопасно очищаем слот - удаляем HTML если фигура размещена
            traySlots[savedDragPieceIndex].innerHTML = '';
            
            await checkLines(blocksPlaced); // Ждем завершения всех анимаций взрывов
            renderTray();
            fillTray();
        } else {
            // Звук при возврате в слот
            playSound('click');
            // Восстанавливаем видимость фигуры при отмене размещения
            if (traySlots[savedDragPieceIndex].firstElementChild) {
                traySlots[savedDragPieceIndex].firstElementChild.style.opacity = '1';
            }
            // Гарантируем, что слот полностью восстановлен в его нормальное состояние
            traySlots[savedDragPieceIndex].style.opacity = '1';
        }
    }

    // --- ЛОГИКА ИГРЫ ---
    function canPlace(shape, startR, startC) {
        for (let r = 0; r < shape.matrix.length; r++) {
            for (let c = 0; c < shape.matrix[0].length; c++) {
                if (shape.matrix[r][c]) {
                    const boardR = startR + r;
                    const boardC = startC + c;
                    // Проверка выхода за границы
                    if (boardR < 0 || boardR >= BOARD_SIZE || boardC < 0 || boardC >= BOARD_SIZE) {
                        return false;
                    }
                    // Проверка занятости клетки
                    if (board[boardR][boardC] !== null) {
                        return false;
                    }
                }
            }
        }
        return true;
    }

    function placeShape(shape, startR, startC) {
        let blocksPlaced = 0;
        for (let r = 0; r < shape.matrix.length; r++) {
            for (let c = 0; c < shape.matrix[0].length; c++) {
                if (shape.matrix[r][c]) {
                    board[startR + r][startC + c] = shape.color;
                    blocksPlaced++;
                }
            }
        }
        
        // Звук установки
        playSound('pop');

        // Очки начисляются в checkLines после учета сброшенных линий
        return blocksPlaced;
    }

    async function checkLines(blocksPlaced) {
        const rowsToClear = [];
        const colsToClear = [];

        // Ищем полные строки
        for (let r = 0; r < BOARD_SIZE; r++) {
            if (board[r].every(cell => cell !== null)) {
                rowsToClear.push(r);
            }
        }

        // Ищем полные столбцы
        for (let c = 0; c < BOARD_SIZE; c++) {
            let colFull = true;
            for (let r = 0; r < BOARD_SIZE; r++) {
                if (board[r][c] === null) {
                    colFull = false;
                    break;
                }
            }
            if (colFull) colsToClear.push(c);
        }

        // Собираем все линии в массив для последовательной анимации
        const linesToClear = [];
        rowsToClear.forEach(r => {
            const line = [];
            for(let c=0; c<BOARD_SIZE; c++) line.push(`${r},${c}`);
            linesToClear.push(line);
        });
        colsToClear.forEach(c => {
            const line = [];
            for(let r=0; r<BOARD_SIZE; r++) line.push(`${r},${c}`);
            linesToClear.push(line);
        });

        const totalLines = linesToClear.length;

        // Начисление очков: 10 * ячейки * (линии + 1)
        const initialPoints = 10 * blocksPlaced * (totalLines + 1);
        score += initialPoints;
        updateScore();

        // Показываем заработанные очки в точке установки
        if (lastPlacementCoords) {
            const centerR = lastPlacementCoords.r;
            const centerC = lastPlacementCoords.c;
            const cell = document.getElementById(`cell-${centerR}-${centerC}`);
            if (cell) {
                const rect = cell.getBoundingClientRect();
                createScorePopup(rect.left + rect.width / 2, rect.top + rect.height / 2, `+${initialPoints}`);
            }
        }

        if (totalLines > 0) {
            isAnimating = true; // Блокируем взаимодействие с новыми фигурами
            
            try {
                // СРАЗУ рендерим доску, чтобы новые блоки (которые могли создать линию) стали видимы
                renderBoard();

                // Очки за линии
                const linePoints = totalLines * 100;
                const comboBonus = totalLines > 1 ? (totalLines - 1) * 50 : 0;
                const extraPoints = linePoints + comboBonus;
                
                score += extraPoints;
                updateScore();

                // Хвалебная надпись и всплывающие очки ТОЛЬКО при комбо
                if (lastPlacementCoords) {
                    const centerR = lastPlacementCoords.r;
                    const centerC = lastPlacementCoords.c;
                    const cell = document.getElementById(`cell-${centerR}-${centerC}`);
                    if (cell) {
                        const rect = cell.getBoundingClientRect();
                        const praiseLines = ['Good!', 'Great!', 'Super!', 'Excellent!', 'Amazing!', 'Incredible!', 'Unbelievable!', 'Godlike!'];
                        const praise = praiseLines[Math.min(totalLines - 1, praiseLines.length - 1)];
                        createPraisePopup(rect.left + rect.width / 2, rect.top + rect.height / 2 - rect.height, praise);
                        
                        // Показываем очки только если это комбо (несколько линий)
                        if (totalLines > 1 && extraPoints > 0) {
                            createScorePopup(rect.left + rect.width / 2, rect.top + rect.height / 2 + rect.height, `+${extraPoints}`);
                        }
                    }
                }

                const cellsToClear = new Set();
                comboDisplay.classList.remove('fade-out');

                // Звук проигрывается один раз за все линии
                playSound('line');

                // Одновременно помечаем все ячейки из всех линий для удаления
                for (let i = 0; i < totalLines; i++) {
                    const currentLine = linesToClear[i];
                    
                    // Анимация текста Комбо (только от 2-х линий)
                    if (totalLines >= 2) {
                        comboDisplay.textContent = 'Combo x' + totalLines;
                        comboDisplay.style.animation = 'none';
                        void comboDisplay.offsetWidth; // Триггер рефлоу для перезапуска анимации
                        comboDisplay.style.animation = 'popCombo 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
                    }

                    // Помечаем все ячейки из текущей линии
                    for (let j = 0; j < currentLine.length; j++) {
                        cellsToClear.add(currentLine[j]);
                    }
                }

                // Одновременно применяем анимацию ко всем ячейкам и создаем частицы
                const coordsArray = Array.from(cellsToClear).map(coord => {
                    const [r, c] = coord.split(',').map(Number);
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    if (cell) {
                        const colorStr = board[r][c];
                        const rect = cell.getBoundingClientRect();
                        createParticles(rect.left + rect.width / 2, rect.top + rect.height / 2, colorStr, 14);
                        
                        const svgCont = cell.querySelector('.block-svg-container');
                        if (svgCont) {
                            svgCont.classList.add('clearing');
                        }
                    }
                    return { coord, r, c };
                });

                // Сортируем ячейки по расстоянию от точки установки блока
                if (lastPlacementCoords) {
                    coordsArray.sort((a, b) => {
                        const distA = Math.abs(a.r - lastPlacementCoords.r) + Math.abs(a.c - lastPlacementCoords.c);
                        const distB = Math.abs(b.r - lastPlacementCoords.r) + Math.abs(b.c - lastPlacementCoords.c);
                        return distA - distB;
                    });
                }

                // Анимация текста Комбо закончится к этому времени
                await new Promise(resolve => setTimeout(resolve, 300));

                // Теперь удаляем блоки по очереди, начиная с ближайшего
                for (const item of coordsArray) {
                    const [r, c] = item.coord.split(',').map(Number);
                    board[r][c] = null;
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    if (cell) {
                        const svgCont = cell.querySelector('.block-svg-container');
                        if (svgCont) {
                            svgCont.style.opacity = '0';
                        }
                    }
                    // Небольшая задержка между удалением ячеек
                    await new Promise(resolve => setTimeout(resolve, 30));
                }

                // Ждем окончания анимации
                await new Promise(resolve => setTimeout(resolve, 150));

                // Прячем текст комбо
                comboDisplay.style.animation = 'none';
                comboDisplay.classList.add('fade-out');

                // Перерисовываем доску
                renderBoard();
            } finally {
                isAnimating = false; // ГАРАНТИРОВАННО разблокируем игру даже при ошибке
            }
        }

        lastPlacementCoords = null; // Сбрасываем после обработки
        return totalLines;
    }

    function createScorePopup(x, y, text) {
        const p = document.createElement('div');
        p.className = 'score-popup';
        p.textContent = text;
        p.style.left = `${x}px`;
        p.style.top = `${y}px`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1000);
    }

    function createPraisePopup(x, y, text) {
        const p = document.createElement('div');
        p.className = 'praise-popup';
        p.textContent = text;
        p.style.left = `${x}px`;
        p.style.top = `${y}px`;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1200);
    }

    function createParticles(x, y, colorStr, particleSize = 14) {
        const pal = BLOCK_PALETTES[colorStr] || BLOCK_PALETTES['var(--color-purple)'];
        const color = pal.light; // Используем светлый оттенок из нашей палитры для эффекта ярких осколков
        
        // Создаем 6-8 частиц для каждого взорванного блока
        for (let i = 0; i < 7; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.backgroundColor = color;
            p.style.boxShadow = `0 0 6px ${color}`;
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            p.style.width = particleSize + 'px';
            p.style.height = particleSize + 'px';
            
            // Рандомный вектор разлета осколков
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 60 + 30; // Дальность полета
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance;
            const rot = Math.random() * 360 + 'deg'; // Вращение осколка
            
            p.style.setProperty('--tx', `calc(-50% + ${tx}px)`);
            p.style.setProperty('--ty', `calc(-50% + ${ty}px)`);
            p.style.setProperty('--rot', rot);
            
            document.body.appendChild(p);
            
            // Удаляем частицы из DOM после окончания анимации
            setTimeout(() => p.remove(), 500);
        }
    }

    function createLandingParticles(x, y, colorStr) {
        const pal = BLOCK_PALETTES[colorStr] || BLOCK_PALETTES['var(--color-purple)'];
        const color = pal.light;
        
        for (let i = 0; i < 5; i++) {
            const p = document.createElement('div');
            p.className = 'landing-particle';
            p.style.backgroundColor = color;
            p.style.opacity = '0.3'; // Более прозрачные
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            p.style.width = '12px';
            p.style.height = '12px';
            
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 40 + 10;
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance;
            
            p.style.setProperty('--tx', `calc(-50% + ${tx}px)`);
            p.style.setProperty('--ty', `calc(-50% + ${ty}px)`);
            
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        }
    }

    function updateScore() {
        // Форматирование числа с запятыми
        scoreEl.textContent = score.toLocaleString('en-US');

        // Анимированный счетчик для центрального табло
        const mainScoreEl = document.getElementById('main-score');
        const duration = 1000; // мс
        const startVal = displayedScore;
        const endVal = score;
        const startTime = performance.now();
        const currentAnimationToken = ++scoreAnimationToken;

        function animate(now) {
            if (currentAnimationToken !== scoreAnimationToken) {
                return;
            }

            const elapsed = now - startTime;
            const progress = Math.min(elapsed / duration, 1);
            
            // easeOutQuad
            const ease = progress * (2 - progress);
            displayedScore = Math.floor(startVal + (endVal - startVal) * ease);
            mainScoreEl.textContent = displayedScore.toLocaleString('en-US');

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                displayedScore = endVal;
                mainScoreEl.textContent = displayedScore.toLocaleString('en-US');
            }
        }
        requestAnimationFrame(animate);
    }

    function checkGameOver() {
        clearPendingGameOver();

        // Проверяем, есть ли хотя бы одно место для любой из оставшихся фигур
        for (let i = 0; i < 3; i++) {
            const piece = trayPieces[i];
            if (!piece) continue;

            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (canPlace(piece, r, c)) {
                        return; // Нашли возможное место, игра продолжается
                    }
                }
            }
        }
        
        // Если места нет
        gameOverTimeoutId = setTimeout(() => {
            showGameOver();
            gameOverTimeoutId = null;
        }, 500);
    }

    loadBestScore();

    // Предотвращаем скролл при касании лотка (глобально для ios)
    document.addEventListener('pointermove', function(e) {
        if(isDragging) e.preventDefault();
    }, { passive: false });

</script>
</body>
