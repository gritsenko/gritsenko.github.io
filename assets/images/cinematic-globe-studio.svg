<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a5c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="globeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2e5c8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a5c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- Grid lines -->
  <g stroke="#2a4a6a" stroke-width="1" opacity="0.3">
    <circle cx="400" cy="300" r="150" fill="none"/>
    <circle cx="400" cy="300" r="100" fill="none"/>
    <circle cx="400" cy="300" r="50" fill="none"/>
    <line x1="400" y1="150" x2="400" y2="450"/>
    <line x1="250" y1="300" x2="550" y2="300"/>
    <line x1="293" y1="193" x2="507" y2="407"/>
    <line x1="507" y1="193" x2="293" y2="407"/>
  </g>
  
  <!-- Globe -->
  <circle cx="400" cy="300" r="120" fill="url(#globeGradient)" filter="url(#glow)"/>
  
  <!-- Continents (abstract) -->
  <g fill="#5a9ed9" opacity="0.6">
    <ellipse cx="370" cy="270" rx="25" ry="20"/>
    <ellipse cx="430" cy="280" rx="30" ry="25"/>
    <ellipse cx="390" cy="320" rx="20" ry="15"/>
    <ellipse cx="420" cy="340" rx="25" ry="18"/>
  </g>
  
  <!-- Orbit rings -->
  <ellipse cx="400" cy="300" rx="180" ry="60" fill="none" stroke="#4a90d9" stroke-width="2" opacity="0.4" transform="rotate(-30 400 300)"/>
  <ellipse cx="400" cy="300" rx="180" ry="60" fill="none" stroke="#4a90d9" stroke-width="2" opacity="0.4" transform="rotate(30 400 300)"/>
  
  <!-- Dots/Nodes -->
  <g fill="#6ab0ff" filter="url(#glow)">
    <circle cx="350" cy="250" r="4"/>
    <circle cx="450" cy="270" r="4"/>
    <circle cx="380" cy="330" r="4"/>
    <circle cx="430" cy="350" r="4"/>
    <circle cx="320" cy="300" r="3"/>
    <circle cx="480" cy="310" r="3"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="480" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.9">CINEMATIC GLOBE</text>
  <text x="400" y="510" font-family="Arial, sans-serif" font-size="18" fill="#6ab0ff" text-anchor="middle" opacity="0.8">STUDIO</text>
  
  <!-- Decorative elements -->
  <g stroke="#4a90d9" stroke-width="1" opacity="0.5">
    <line x1="100" y1="100" x2="150" y2="100"/>
    <line x1="100" y1="500" x2="150" y2="500"/>
    <line x1="650" y1="100" x2="700" y2="100"/>
    <line x1="650" y1="500" x2="700" y2="500"/>
  </g>
</svg>
