<body class="flex items-center justify-center min-h-screen p-4">

    <div class="card max-w-2xl w-full rounded-lg overflow-hidden p-8 text-center">
        <!-- Изображение Джейсона Стэтхэма -->
        <div class="flex justify-center mb-6">
            <img id="statham-image" src="./staham.jpeg" alt="Изображение Джейсона Стэтхэма" class="w-48 h-48 md:w-64 md:h-64 rounded-full object-cover border-4 border-[#cdaa7d]" loading="lazy" onerror="this.onerror=null; this.src='staham.jpeg';">
        </div>

        <!-- Контейнер для цитаты -->
        <div class="quote-container">
            <blockquote class="quote-text mb-4">
                <p id="quote-display">Загрузка цитаты...</p>
            </blockquote>
            <cite id="author-display" class="author-name block"></cite>
            <!-- Кнопка Поделиться -->
            <div class="mt-6 flex justify-center">
                <button id="share-btn" type="button" aria-label="Поделиться цитатой" class="px-4 py-2 rounded-md bg-[#cdaa7d] text-[#3a2d2d] hover:bg-[#b38a5c] focus:outline-none focus:ring-2 focus:ring-[#cdaa7d] focus:ring-offset-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
                        <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7 0-.24-.03-.47-.09-.7l7.02-4.11A2.99 2.99 0 0 0 18 7.91a3 3 0 1 0-2.83-3.91 3 3 0 0 0 .17 1.96L8.32 9.96a3.003 3.003 0 1 0 0 4.08l7.02 4.11c-.11.29-.17.6-.17.93a3 3 0 1 0 3-3z"/>
                    </svg>
                    Поделиться
                </button>
            </div>
        </div>
    </div>

    <script>
        // Инициализация цитаты: использует quoteId из URL или выбирает случайную
        async function initQuote() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                const quotes = data.quotes || [];

                // Попробуем прочитать quoteId из query
                const params = new URLSearchParams(window.location.search);
                const qidParam = params.get('quoteId');
                let selectedQuote = null;

                if (qidParam) {
                    const id = parseInt(qidParam, 10);
                    if (!Number.isNaN(id)) {
                        selectedQuote = quotes.find(q => Number(q.id) === id) || null;
                    }
                }

                // Если цитата не найдена по id, выбираем случайную
                if (!selectedQuote) {
                    if (quotes.length === 0) throw new Error('No quotes available');
                    selectedQuote = quotes[Math.floor(Math.random() * quotes.length)];
                }

                // Обновляем URL, чтобы в нём был quoteId текущей цитаты (без добавления в историю)
                try {
                    const newUrl = new URL(window.location.href);
                    newUrl.searchParams.set('quoteId', selectedQuote.id);
                    history.replaceState(null, '', newUrl.toString());
                } catch (e) {
                    // ignore if URL can't be constructed (file:// etc.)
                }

                // Отображаем цитату
                displayQuote(selectedQuote, data.author);

            } catch (error) {
                console.error('Не удалось загрузить цитаты:', error);
                document.getElementById('quote-display').textContent = 'Не удалось загрузить цитату. Попробуйте обновить страницу.';
            }
        }

        // Отдельная функция для отображения цитаты и обновления метаданных
        function displayQuote(quoteObj, author) {
            const text = quoteObj && quoteObj.text ? quoteObj.text : '';
            document.getElementById('quote-display').textContent = `"${text}"`;
            document.getElementById('author-display').textContent = `— ${author || ''}`;

            // Сохраняем для шаринга
            window.currentQuote = text;
            window.currentAuthor = author;
            // Сохраняем текущий id, если есть
            window.currentQuoteId = quoteObj && (quoteObj.id || quoteObj.ID || quoteObj.Id) ? quoteObj.id : null;

            // Обновляем OG/Twitter description и url/img если возможно
            const descText = `"${text}" — ${author || ''}`;
            const ogDesc = document.querySelector('meta[property="og:description"]');
            const twDesc = document.querySelector('meta[name="twitter:description"]');
            if (ogDesc) ogDesc.setAttribute('content', descText);
            if (twDesc) twDesc.setAttribute('content', descText);

            const origin = window.location.origin;
            if (origin && origin.startsWith('http')) {
                const ogUrl = document.querySelector('meta[property="og:url"]');
                const ogImg = document.querySelector('meta[property="og:image"]');
                const twImg = document.querySelector('meta[name="twitter:image"]');
                if (ogUrl) ogUrl.setAttribute('content', window.location.href);
                const base = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');
                const absImg = (base.endsWith('/') ? base : base + '/') + 'og.png';
                if (ogImg) ogImg.setAttribute('content', absImg);
                if (twImg) twImg.setAttribute('content', absImg);
            }
        }

        // Запускаем инициализацию при загрузке
        window.onload = initQuote;

        // Prevent pinch-to-zoom and double-tap zoom on touch devices
        (function preventTouchZoom() {
            // gesturestart is fired on iOS Safari during pinch gestures
            window.addEventListener('gesturestart', function (e) {
                e.preventDefault();
            }, { passive: false });

            // Prevent double-tap zoom
            let lastTouch = 0;
            window.addEventListener('touchend', function (e) {
                const now = Date.now();
                if (now - lastTouch <= 300) {
                    // prevent the double-tap zoom
                    e.preventDefault();
                }
                lastTouch = now;
            }, { passive: false });
        })();

        // Поделиться цитатой: Web Share API с фолбеком на копирование
        function getShareText() {
            const q = window.currentQuote || (document.getElementById('quote-display').textContent || '').replace(/^"|"$/g, '');
            const a = window.currentAuthor || (document.getElementById('author-display').textContent || '').replace(/^—\s*/, '');
            return `"${q}" — ${a}`;
        }

        async function shareQuote() {
            const text = getShareText();
            // Ensure URL contains current quoteId
            let url;
            try {
                const u = new URL(window.location.href);
                if (window.currentQuoteId) u.searchParams.set('quoteId', window.currentQuoteId);
                url = u.toString();
            } catch (e) {
                // fallback to location.href with naive append
                url = window.location.href.split('?')[0] + (window.currentQuoteId ? `?quoteId=${window.currentQuoteId}` : '');
            }
            try {
                // Prefer copying to clipboard on desktop browsers (non-mobile); use navigator.share on mobile when available
                const ua = navigator.userAgent || '';
                const isMobile = /Mobile|Android|iPhone|iPad|iPod|Mobi/.test(ua);
                const isDesktop = !isMobile;
                if (navigator.share && !isDesktop) {
                    await navigator.share({
                        title: 'Цитата Джейсона Стэтхэма',
                        text,
                        url
                    });
                } else if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(`${text}\n${url}`);
                    showCopyToast('Ссылка скопирована в буфер обмена');
                } else {
                    const ta = document.createElement('textarea');
                    ta.value = `${text}\n${url}`;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    showCopyToast('Ссылка скопирована в буфер обмена');
                }
            } catch (e) {
                console.error('Не удалось поделиться:', e);
            }
        }

        // Toast helper
        function showCopyToast(msg, duration = 2200) {
            let t = document.getElementById('copy-toast');
            if (!t) return;
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), duration);
        }

        // Навешиваем обработчик на кнопку
        const shareBtn = document.getElementById('share-btn');
        if (shareBtn) {
            shareBtn.addEventListener('click', shareQuote);
        }
    </script>
</script>
