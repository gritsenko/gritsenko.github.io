<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Однорукий бандит — комбинации</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Bungee&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --felt:#0c3b30; --felt-dark:#062019;
    --lacquer:#5e0f1e; --lacquer-2:#7c1428;
    --brass:#c9a23a; --brass-hi:#f0d27a; --brass-lo:#8a6d1f;
    --cream:#f4ecd6; --ink:#241010;
    --cherry:#d8323b; --teal:#36c5d6; --bulb:#ffd66b;
    --cell:108px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Oswald',sans-serif;
    color:var(--cream);
    background:
      radial-gradient(120% 90% at 50% -10%, #135043 0%, var(--felt) 38%, var(--felt-dark) 100%);
    min-height:100%;
    display:flex; flex-direction:column; align-items:center;
    padding:32px 16px 64px;
    overflow-x:hidden;
  }
  body::before{ /* felt weave */
    content:""; position:fixed; inset:0; pointer-events:none; opacity:.5;
    background-image:
      repeating-linear-gradient(45deg, rgba(0,0,0,.05) 0 2px, transparent 2px 4px),
      repeating-linear-gradient(-45deg, rgba(255,255,255,.018) 0 2px, transparent 2px 4px);
  }

  .stage{ width:100%; max-width:760px; display:flex; flex-direction:column; align-items:center; z-index:1; }

  /* ---- CABINET ---- */
  .cabinet{
    width:100%; max-width:520px; position:relative;
    background:linear-gradient(180deg, var(--lacquer-2), var(--lacquer) 60%, #480a17);
    border-radius:34px 34px 26px 26px;
    padding:18px 22px 26px;
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,.12),
      inset 0 -10px 30px rgba(0,0,0,.45),
      0 26px 60px rgba(0,0,0,.55),
      0 0 0 6px var(--brass-lo),
      0 0 0 9px #3a2c0c;
  }

  /* marquee */
  .marquee{ position:relative; text-align:center; padding:14px 26px 16px; margin-bottom:6px; }
  .marquee h1{
    font-family:'Rye',serif; color:var(--brass-hi);
    font-size:clamp(28px,8vw,46px); line-height:1; letter-spacing:1px;
    text-shadow:0 2px 0 #4a380f, 0 0 18px rgba(240,210,122,.45);
  }
  .marquee .sub{
    font-family:'Bungee',sans-serif; font-size:11px; letter-spacing:5px;
    color:var(--cream); opacity:.8; margin-top:6px;
  }
  .bulbs{ position:absolute; inset:0; pointer-events:none; }
  .bulb{
    position:absolute; width:9px; height:9px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, var(--bulb) 55%, #b8821a 100%);
    box-shadow:0 0 8px 2px rgba(255,214,107,.7);
    animation:flick 1.4s infinite steps(1);
  }
  @keyframes flick{0%,100%{opacity:1}50%{opacity:.25}}

  /* reels */
  .reels{
    display:flex; gap:10px; justify-content:center;
    background:linear-gradient(180deg,#1c0f0a,#0c0605);
    padding:14px; border-radius:16px;
    box-shadow:inset 0 0 0 3px var(--brass), inset 0 6px 22px rgba(0,0,0,.8);
  }
  .reel{
    width:108px; height:var(--cell); overflow:hidden; position:relative;
    background:linear-gradient(180deg,#fff,var(--cream) 30%,#e6d9b6 70%,#cdbd92);
    border-radius:8px;
    box-shadow:inset 0 6px 10px rgba(0,0,0,.28), inset 0 -6px 10px rgba(0,0,0,.28);
  }
  .reel::before,.reel::after{ /* curvature shading on the drum */
    content:""; position:absolute; left:0; right:0; height:34%; pointer-events:none; z-index:3;
  }
  .reel::before{ top:0; background:linear-gradient(180deg, rgba(20,8,4,.5), transparent); }
  .reel::after{ bottom:0; background:linear-gradient(0deg, rgba(20,8,4,.5), transparent); }
  .strip{ display:flex; flex-direction:column; will-change:transform; }
  .cell{
    height:var(--cell); flex:0 0 var(--cell);
    display:flex; align-items:center; justify-content:center;
  }
  .cell svg{ width:74px; height:74px; display:block; }

  /* payline */
  .payline-wrap{ position:relative; }
  .payline{
    position:absolute; top:50%; left:-10px; right:-10px; height:3px;
    transform:translateY(-50%); z-index:5; pointer-events:none;
    background:linear-gradient(90deg,transparent,var(--cherry) 12%,var(--cherry) 88%,transparent);
    box-shadow:0 0 10px var(--cherry); opacity:.85;
  }
  .pin{ position:absolute; top:50%; width:13px; height:13px; transform:translateY(-50%) rotate(45deg);
    background:var(--cherry); box-shadow:0 0 8px var(--cherry); z-index:6; }
  .pin.l{ left:-16px } .pin.r{ right:-16px }

  /* readout */
  .readout{
    display:flex; justify-content:space-between; align-items:stretch; gap:10px;
    margin-top:16px;
  }
  .gauge{
    flex:1; background:#0c0605; border-radius:10px; padding:8px 12px;
    box-shadow:inset 0 0 0 2px var(--brass-lo), inset 0 4px 12px rgba(0,0,0,.7);
    text-align:center;
  }
  .gauge .lab{ font-size:10px; letter-spacing:3px; color:var(--brass-hi); opacity:.8 }
  .gauge .val{ font-family:'Bungee',sans-serif; font-size:26px; color:#ffe9a8; line-height:1.1;
    text-shadow:0 0 12px rgba(255,214,107,.5) }
  .gauge.win .val{ color:#fff; animation:pop .5s ease }
  @keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.18)}100%{transform:scale(1)}}

  /* controls */
  .controls{ display:flex; align-items:center; gap:16px; margin-top:18px; }
  .spin-btn{
    flex:1; font-family:'Bungee',sans-serif; font-size:20px; letter-spacing:2px;
    color:#3a0a12; cursor:pointer; border:none; padding:16px;
    border-radius:14px; text-transform:uppercase;
    background:linear-gradient(180deg,var(--brass-hi),var(--brass) 55%,var(--brass-lo));
    box-shadow:0 5px 0 #6e560f, 0 9px 18px rgba(0,0,0,.45), inset 0 2px 0 rgba(255,255,255,.5);
    transition:transform .08s, box-shadow .08s;
  }
  .spin-btn:hover{ filter:brightness(1.06) }
  .spin-btn:active{ transform:translateY(4px); box-shadow:0 1px 0 #6e560f, 0 4px 10px rgba(0,0,0,.4), inset 0 2px 0 rgba(255,255,255,.5) }
  .spin-btn:disabled{ filter:grayscale(.4) brightness(.85); cursor:not-allowed }
  .spin-btn:focus-visible{ outline:3px solid #fff; outline-offset:3px }

  /* lever on the side of the cabinet */
  .lever{
    position:absolute; top:120px; right:-46px; width:46px; height:200px; z-index:0;
  }
  .lever .mount{ position:absolute; right:8px; top:96px; width:22px; height:22px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #efe7d4, #b9ab86); box-shadow:0 2px 6px rgba(0,0,0,.5); }
  .lever .arm-pivot{ position:absolute; right:18px; top:106px; transform-origin:bottom center;
    transition:transform .5s cubic-bezier(.5,1.6,.4,1); }
  .lever.pulled .arm-pivot{ transform:rotate(58deg) }
  .lever .arm{ width:8px; height:96px; margin:0 auto;
    background:linear-gradient(90deg,#d9cba6,#9c8a5e); border-radius:6px;
    box-shadow:inset -2px 0 3px rgba(0,0,0,.4); }
  .lever .knob{ width:30px; height:30px; border-radius:50%; margin:-6px auto 0;
    background:radial-gradient(circle at 32% 28%, #ff7a7f, var(--cherry) 55%, #8c1620 100%);
    box-shadow:0 3px 8px rgba(0,0,0,.5), inset 0 -3px 6px rgba(0,0,0,.35); }

  /* ---- PAYTABLE ---- */
  .paytable{
    width:100%; max-width:520px; margin-top:34px;
    background:rgba(8,28,22,.55); border:1px solid rgba(201,162,58,.35);
    border-radius:18px; padding:18px 20px 22px; backdrop-filter:blur(2px);
  }
  .paytable h2{
    font-family:'Rye',serif; color:var(--brass-hi); font-size:22px; text-align:center;
    margin-bottom:4px; letter-spacing:1px;
  }
  .paytable .note{ text-align:center; font-size:12px; opacity:.7; letter-spacing:2px; margin-bottom:14px; }
  .pay-row{
    display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:14px;
    padding:9px 6px; border-bottom:1px dashed rgba(201,162,58,.22);
  }
  .pay-row:last-child{ border-bottom:none }
  .pay-row.jackpot{ background:linear-gradient(90deg,rgba(216,50,59,.18),transparent);
    border-radius:10px; }
  .combo{ display:flex; gap:4px; }
  .combo svg{ width:34px; height:34px; }
  .combo .ghost{ opacity:.22 }
  .pay-name{ font-size:14px; letter-spacing:1px; color:var(--cream); }
  .pay-name b{ font-family:'Bungee',sans-serif; color:var(--brass-hi); font-weight:400; font-size:13px; }
  .mult{ font-family:'Bungee',sans-serif; font-size:18px; color:#ffe9a8;
    white-space:nowrap; text-shadow:0 0 10px rgba(255,214,107,.4) }
  .pay-row.jackpot .mult{ color:#ff9aa0 }

  .hint{ margin-top:18px; font-size:12.5px; opacity:.65; text-align:center; max-width:520px; line-height:1.6; letter-spacing:.5px; }

  @media (max-width:520px){
    :root{ --cell:88px }
    .reel{ width:88px } .cell svg{ width:60px; height:60px }
    .lever{ display:none }
  }
  @media (prefers-reduced-motion:reduce){
    .bulb{ animation:none } .strip{ transition:none !important }
  }
</style>
</head>
<body>

<!-- SVG symbol library -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="brassG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6dd92"/><stop offset="1" stop-color="#b8861c"/>
    </linearGradient>
    <radialGradient id="gemG" cx="40%" cy="32%" r="75%">
      <stop offset="0" stop-color="#bff4fb"/><stop offset="55%" stop-color="#36c5d6"/><stop offset="100%" stop-color="#1a7a8a"/>
    </radialGradient>
  </defs>

  <symbol id="s-cherry" viewBox="0 0 100 100">
    <path d="M52 22 C58 14 74 12 84 18" fill="none" stroke="#3f7d2c" stroke-width="4" stroke-linecap="round"/>
    <path d="M44 24 C40 16 30 14 22 18" fill="none" stroke="#3f7d2c" stroke-width="4" stroke-linecap="round"/>
    <path d="M50 20 q14 -10 26 -2 q-14 4 -26 2z" fill="#5aa83a"/>
    <circle cx="34" cy="70" r="18" fill="#d8323b"/><circle cx="66" cy="66" r="16" fill="#b51f2a"/>
    <circle cx="28" cy="64" r="5" fill="#ff8b90" opacity=".8"/><circle cx="60" cy="60" r="4" fill="#ff8b90" opacity=".7"/>
  </symbol>

  <symbol id="s-lemon" viewBox="0 0 100 100">
    <ellipse cx="50" cy="54" rx="32" ry="24" fill="#f2c744"/>
    <ellipse cx="50" cy="54" rx="32" ry="24" fill="none" stroke="#c79a1e" stroke-width="3"/>
    <path d="M82 50 l9 -3 -7 7z" fill="#d9a92a"/>
    <ellipse cx="40" cy="46" rx="10" ry="6" fill="#fde79a" opacity=".8"/>
    <path d="M30 32 q6 -10 16 -8" fill="none" stroke="#5aa83a" stroke-width="4" stroke-linecap="round"/>
  </symbol>

  <symbol id="s-grape" viewBox="0 0 100 100">
    <path d="M50 18 q10 -8 20 -4" fill="none" stroke="#5aa83a" stroke-width="4" stroke-linecap="round"/>
    <g fill="#7a3fa0">
      <circle cx="50" cy="34" r="10"/><circle cx="36" cy="46" r="10"/><circle cx="64" cy="46" r="10"/>
      <circle cx="50" cy="56" r="10"/><circle cx="30" cy="64" r="9"/><circle cx="70" cy="64" r="9"/>
      <circle cx="50" cy="76" r="9"/>
    </g>
    <g fill="#b07fd0" opacity=".7"><circle cx="47" cy="31" r="3"/><circle cx="33" cy="43" r="3"/><circle cx="61" cy="43" r="3"/></g>
  </symbol>

  <symbol id="s-bell" viewBox="0 0 100 100">
    <rect x="46" y="18" width="8" height="10" rx="3" fill="#8a6d1f"/>
    <path d="M30 70 C30 44 38 30 50 30 C62 30 70 44 70 70 Z" fill="url(#brassG)" stroke="#8a6d1f" stroke-width="3"/>
    <rect x="26" y="70" width="48" height="8" rx="4" fill="url(#brassG)" stroke="#8a6d1f" stroke-width="2"/>
    <circle cx="50" cy="84" r="6" fill="#8a6d1f"/>
    <path d="M42 40 q-6 14 -4 28" fill="none" stroke="#fff3c9" stroke-width="3" opacity=".7"/>
  </symbol>

  <symbol id="s-diamond" viewBox="0 0 100 100">
    <polygon points="30,34 70,34 90,46 50,86 10,46" fill="url(#gemG)"/>
    <polygon points="30,34 70,34 60,46 40,46" fill="#dffafe" opacity=".85"/>
    <polygon points="40,46 60,46 50,86" fill="#1a7a8a" opacity=".55"/>
    <polygon points="10,46 40,46 50,86" fill="#2aa6b7"/>
    <polygon points="60,46 90,46 50,86" fill="#23929f"/>
    <line x1="30" y1="34" x2="40" y2="46" stroke="#eafcff" stroke-width="2" opacity=".6"/>
  </symbol>

  <symbol id="s-bar" viewBox="0 0 100 100">
    <rect x="14" y="34" width="72" height="32" rx="7" fill="url(#brassG)" stroke="#6e560f" stroke-width="3"/>
    <text x="50" y="57" text-anchor="middle" font-family="Bungee, sans-serif" font-size="26" fill="#3a0a12">BAR</text>
  </symbol>

  <symbol id="s-seven" viewBox="0 0 100 100">
    <text x="50" y="74" text-anchor="middle" font-family="Bungee, sans-serif" font-size="74" fill="#d8323b" stroke="#7c1428" stroke-width="2" paint-order="stroke">7</text>
  </symbol>
</svg>

<div class="stage">
  <div class="cabinet">
    <div class="lever" id="lever">
      <div class="mount"></div>
      <div class="arm-pivot"><div class="arm"></div><div class="knob"></div></div>
    </div>

    <div class="marquee">
      <div class="bulbs" id="bulbs"></div>
      <h1>JACKPOT</h1>
      <div class="sub">ОДНОРУКИЙ&nbsp;БАНДИТ</div>
    </div>

    <div class="payline-wrap">
      <div class="reels" id="reels">
        <div class="reel"><div class="strip" id="r0"></div></div>
        <div class="reel"><div class="strip" id="r1"></div></div>
        <div class="reel"><div class="strip" id="r2"></div></div>
      </div>
      <div class="payline"></div>
      <span class="pin l"></span><span class="pin r"></span>
    </div>

    <div class="readout">
      <div class="gauge"><div class="lab">КРЕДИТЫ</div><div class="val" id="credits">100</div></div>
      <div class="gauge" id="winGauge"><div class="lab">ВЫИГРЫШ</div><div class="val" id="win">0</div></div>
    </div>

    <div class="controls">
      <button class="spin-btn" id="spin">Крутить · 1</button>
    </div>
  </div>

  <div class="paytable" id="paytable">
    <h2>Таблица выплат</h2>
    <div class="note">три в ряд по линии · ставка ×1</div>
    <div id="payrows"></div>
  </div>

  <p class="hint">Дёрни рычаг (или жми «Крутить»). Линия посередине — выигрышная: совпали символы на ней — получаешь выплату по таблице. Вишня — особый символ: платит даже одна или две.</p>
</div>

<script>
(() => {
  const SYM = {
    cherry:  {svg:'s-cherry',  w:22, name:'Вишня'},
    lemon:   {svg:'s-lemon',   w:20, name:'Лимон'},
    grape:   {svg:'s-grape',   w:16, name:'Виноград'},
    bell:    {svg:'s-bell',    w:14, name:'Колокол'},
    bar:     {svg:'s-bar',     w:12, name:'BAR'},
    diamond: {svg:'s-diamond', w:9,  name:'Бриллиант'},
    seven:   {svg:'s-seven',   w:7,  name:'Семёрка'},
  };
  // payouts for three-of-a-kind
  const THREE = { seven:100, diamond:60, bar:40, bell:25, grape:15, lemon:10, cherry:8 };
  const keys = Object.keys(SYM);
  const pool = []; keys.forEach(k => { for(let i=0;i<SYM[k].w;i++) pool.push(k); });

  const use = id => `<svg viewBox="0 0 100 100"><use href="#${id}"/></svg>`;
  const cell = k => `<div class="cell">${use(SYM[k].svg)}</div>`;

  // ---- build paytable UI ----
  const rows = [];
  Object.keys(THREE).forEach(k => {
    rows.push({combo:[k,k,k], name:SYM[k].name+' ×3', mult:THREE[k], jack:k==='seven'});
  });
  rows.push({combo:['cherry','cherry','ghost'], name:'Две вишни', mult:3});
  rows.push({combo:['cherry','ghost','ghost'], name:'Одна вишня', mult:1});
  document.getElementById('payrows').innerHTML = rows.map(r => `
    <div class="pay-row ${r.jack?'jackpot':''}">
      <div class="combo">${r.combo.map(c => c==='ghost'
        ? `<svg class="ghost" viewBox="0 0 100 100"><circle cx="50" cy="50" r="30" fill="#fff"/></svg>`
        : use(SYM[c].svg)).join('')}</div>
      <div class="pay-name">${r.jack?'<b>ДЖЕКПОТ · </b>':''}${r.name}</div>
      <div class="mult">×${r.mult}</div>
    </div>`).join('');

  // ---- marquee bulbs ----
  const bulbs = document.getElementById('bulbs'); const N=18;
  for(let i=0;i<N;i++){
    const b=document.createElement('div'); b.className='bulb';
    const t=i/N; let x,y;
    if(i<N/2){ x = 6 + (88*(t*2)); y=2; } else { x = 94 - (88*((t-0.5)*2)); y=92; }
    b.style.left=x+'%'; b.style.top=y+'%'; b.style.animationDelay=(i*0.12)+'s';
    bulbs.appendChild(b);
  }

  const reels = [0,1,2].map(i => document.getElementById('r'+i));
  const result = ['cherry','lemon','grape'];
  const pick = () => pool[Math.floor(Math.random()*pool.length)];
  const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;

  // init reels showing the starting result centered
  reels.forEach((s,i)=>{ s.innerHTML = cell(result[i]); s.style.transform='translateY(0)'; });

  let credits = 100, spinning = false;
  const $c = document.getElementById('credits'), $w = document.getElementById('win');
  const $wg = document.getElementById('winGauge'), $spin = document.getElementById('spin');
  const lever = document.getElementById('lever');

  function buildSpin(strip, finalSym){
    const K = 26;
    let html = cell(result_prev(strip));         // current top = old result (no jump)
    for(let i=0;i<K-2;i++) html += cell(pick());
    html += cell(finalSym);                       // landing symbol
    strip.innerHTML = html;
    strip.style.transition='none';
    strip.style.transform='translateY(0)';
    return K;
  }
  // remember previous landed symbol per strip
  const prev = ['cherry','lemon','grape'];
  function result_prev(strip){ return prev[reels.indexOf(strip)]; }

  function spin(){
    if(spinning) return;
    if(credits < 1){ flash('НЕТ КРЕДИТОВ'); return; }
    spinning = true; credits -= 1; $c.textContent = credits;
    $spin.disabled = true; $wg.classList.remove('win'); $w.textContent = '0';

    lever.classList.add('pulled');
    setTimeout(()=>lever.classList.remove('pulled'), 520);

    const finals = reels.map(() => pick());
    const durations = [1.5, 1.95, 2.4];

    reels.forEach((s,i)=>{
      const K = buildSpin(s, finals[i]);
      const dist = (K-1) * getCell();
      // force reflow then animate
      void s.offsetHeight;
      if(reduce){ s.style.transform = `translateY(${-dist}px)`; }
      else{
        s.style.transition = `transform ${durations[i]}s cubic-bezier(.18,.7,.16,1.02)`;
        s.style.transform = `translateY(${-dist}px)`;
      }
    });

    const wait = reduce ? 120 : durations[2]*1000 + 120;
    setTimeout(()=>{
      finals.forEach((f,i)=>{ prev[i]=f; });
      evaluate(finals);
      spinning = false; $spin.disabled = false;
    }, wait);
  }

  function getCell(){ return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cell')); }

  function evaluate(f){
    let win = 0, label = '';
    if(f[0]===f[1] && f[1]===f[2]){ win = THREE[f[0]]; label = SYM[f[0]].name.toUpperCase()+' ×3'; }
    else {
      const ch = f.filter(x=>x==='cherry').length;
      if(ch>=2 && f[0]==='cherry' && f[1]==='cherry'){ win=3; label='ДВЕ ВИШНИ'; }
      else if(f[0]==='cherry'){ win=1; label='ВИШНЯ'; }
    }
    if(win>0){
      credits += win; $c.textContent = credits;
      $w.textContent = win; $wg.classList.add('win');
      flash(label);
    } else {
      $w.textContent = '0';
    }
  }

  let flashTimer;
  function flash(msg){
    clearTimeout(flashTimer);
    const lab = $wg.querySelector('.lab');
    const orig = 'ВЫИГРЫШ';
    lab.textContent = msg;
    flashTimer = setTimeout(()=>{ lab.textContent = orig; }, 1600);
  }

  $spin.addEventListener('click', spin);
  lever.addEventListener('click', spin);
  document.addEventListener('keydown', e=>{ if(e.code==='Space'){ e.preventDefault(); spin(); }});
})();
</script>
</body>
</html>
