<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Chpok</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

        :root {
            --bg-color: #fdf8fb;
            --bg-gradient: linear-gradient(135deg, #fdf8fb 0%, #eee3eb 100%);
            --board-bg: #2a2e54;
            --cell-bg: #383d6b;
            --text-color: #333;
            
            /* Цвета блоков из референса */
            --color-orange: #f58220;
            --color-blue: #35a0f0;
            --color-green: #66cc33;
            --color-purple: #b042ff;
            --color-yellow: #ffcc00;
            --color-red: #f03030;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none; /* Предотвращает скролл на мобильных */
        }

        .game-container {
            width: 100%;
            max-width: 430px; /* Размер типичного смартфона */
            height: 100%;
            max-height: 932px;
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
            position: relative;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .settings-btn {
            width: 45px;
            height: 45px;
            background: #60a5fa;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 0 #3b82f6, inset 0 2px 4px rgba(255,255,255,0.4);
            cursor: pointer;
        }

        .settings-btn svg {
            fill: white;
            width: 24px;
            height: 24px;
        }

        .title-container {
            text-align: center;
            flex-grow: 1;
        }

        .title {
            font-size: 32px;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(to bottom, #ff7a9e, #ff4d79);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: 1px white;
            filter: drop-shadow(0px 3px 0px #b13565);
            margin: 0;
            position: relative;
        }

        .title span {
            display: block;
            color: #38bdf8;
            background: linear-gradient(to bottom, #7dd3fc, #0284c7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 3px 0px #0369a1);
        }

        .stats-box {
            background: rgba(0, 0, 0, 0.1);
            padding: 8px 12px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 90px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #555;
        }

        .stat-icon {
            width: 18px;
            height: 18px;
        }

        .level-text {
            text-align: center;
            font-size: 20px;
            color: #444;
            margin: 10px 0 15px 0;
            font-weight: 700;
        }

        /* Игровое поле */
        .board-container {
            background: var(--board-bg);
            border-radius: 12px;
            padding: 6px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.1);
            margin-bottom: 20px;
            position: relative;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 3px;
            aspect-ratio: 1 / 1;
            width: 100%;
        }

        .cell {
            background: var(--cell-bg);
            border-radius: 6px;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .cell.preview {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
        }

        .block-svg-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Трей (панель с фигурами) */
        .tray {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
            height: 140px; /* Фиксируем высоту вместо растягивания */
            flex-shrink: 0;
        }

        .tray-slot {
            flex: 1;
            background: rgba(160, 150, 180, 0.25);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Формы фигур */
        .shape {
            display: grid;
            gap: 3px;
            pointer-events: none; /* Важно для драг-н-дропа */
        }

        .shape .block {
            width: 100%;
            height: 100%;
        }

        .shape .block.empty {
            visibility: hidden;
        }

        /* Клонированная фигура при перетаскивании */
        .drag-clone {
            position: fixed;
            z-index: 1000;
            pointer-events: none;
            transition: transform 0.1s;
        }

        /* Нижние кнопки */
        .bottom-controls {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: auto;
            padding-bottom: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px 0;
            border-radius: 25px;
            border: none;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.15), inset 0 2px 4px rgba(255,255,255,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.15), inset 0 2px 4px rgba(255,255,255,0.3);
        }

        .btn-blue { background: #60a5fa; box-shadow: 0 5px 0 #3b82f6; }
        .btn-blue:active { box-shadow: 0 2px 0 #3b82f6; }
        
        .btn-yellow { background: #fbbf24; box-shadow: 0 5px 0 #d97706; color: #854d0e; }
        .btn-yellow:active { box-shadow: 0 2px 0 #d97706; }

        .btn-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Анимации уничтожения */
        .clearing {
            animation: blast 0.3s forwards;
            z-index: 10;
        }

        @keyframes blast {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(2); }
            100% { transform: scale(0); opacity: 0; }
        }

        /* Плавающий текст комбо */
        .combo-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: 900;
            color: #fbbf24;
            -webkit-text-stroke: 1px #fff;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            z-index: 100;
            pointer-events: none;
            animation: floatUp 1.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translate(-50%, -10px) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -30px) scale(1.2); opacity: 1; }
            80% { transform: translate(-50%, -50px) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -60px) scale(1); opacity: 0; }
        }

        /* Экран Game Over */
        #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #game-over.show {
            visibility: visible;
            opacity: 1;
        }

        #game-over h2 {
            color: white;
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .restart-btn {
            flex: none; /* Убираем растягивание от базового класса .btn */
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            height: auto;
        }

        /* Частицы для взрыва */
        .particle {
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 3px;
            pointer-events: none;
            z-index: 150;
            animation: explode 0.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes explode {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot)); opacity: 0; }
        }

    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div class="settings-btn">
            <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        </div>

        <div class="stats-box">

                <svg class="stat-icon" viewBox="0 0 24 24" fill="#fbbf24"><path d="M20.2 4.6l-2-1.3C18 3.1 17.7 3 17.4 3H6.6c-.3 0-.6.1-.8.3l-2 1.3C3.3 5 3 5.5 3 6.1V8c0 2.2 1.8 4 4 4h.4c.5 2.1 2.3 3.8 4.6 4v2h-2c-.6 0-1 .4-1 1s.4 1 1 1h4c.6 0 1-.4 1-1s-.4-1-1-1h-2v-2c2.3-.2 4.1-1.9 4.6-4H17c2.2 0 4-1.8 4-4V6.1c0-.6-.3-1.1-.8-1.5zM7 10H5c-1.1 0-2-.9-2-2V6.4l1.2-.8h2.8V10zM19 10h-2V5.6h2.8l1.2.8V8C21 9.1 20.1 10 19 10z"/></svg>
                <span id="score">0</span>
            </div>
            <div class="stat-row">
                <svg class="stat-icon" viewBox="0 0 24 24" fill="#facc15"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M9 9h6M9 15h6" stroke="#ca8a04" stroke-width="2"/></svg>
                <span>5,820</span>
            </div>
        </div>
    </div>

    <div class="level-text">Уровень 48</div>

    <div class="board-container">
        <div class="board" id="board">
            <!-- Клетки генерируются в JS -->
        </div>
        <div id="combo-display" class="combo-text"></div>
    </div>

    <div class="tray" id="tray">
        <div class="tray-slot" id="slot-0"></div>

    <div class="bottom-controls">
        <button class="btn btn-blue">
            <svg class="btn-icon" viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>

        </button>

            <svg class="btn-icon" viewBox="0 0 24 24"><path d="M16 11V3H8v6H2v12h20V11h-6zm-6-6h4v14h-4V5zm-6 6h4v8H4v-8zm16 8h-4v-6h4v6z"/></svg>

        </button>

<script>
    // --- НАСТРОЙКИ И ДАННЫЕ ---
    const BOARD_SIZE = 8;
    const COLORS = {
        orange: 'var(--color-orange)',
        blue: 'var(--color-blue)',
        green: 'var(--color-green)',
        purple: 'var(--color-purple)',
        yellow: 'var(--color-yellow)',
        red: 'var(--color-red)'
    };

    // Все возможные фигуры
    const SHAPES_DATA = [
        { matrix: [[1]], color: COLORS.yellow }, // 1x1
        { matrix: [[1,1],[1,1]], color: COLORS.blue }, // 2x2
        { matrix: [[1,1,1],[1,1,1],[1,1,1]], color: COLORS.red }, // 3x3
        { matrix: [[1,1]], color: COLORS.green }, // h2
        { matrix: [[1],[1]], color: COLORS.green }, // v2
        { matrix: [[1,1,1]], color: COLORS.orange }, // h3
        { matrix: [[1],[1],[1]], color: COLORS.orange }, // v3
        { matrix: [[1,1,1,1]], color: COLORS.blue }, // h4
        { matrix: [[1],[1],[1],[1]], color: COLORS.blue }, // v4
        { matrix: [[1,1,1,1,1]], color: COLORS.purple }, // h5
        { matrix: [[1],[1],[1],[1],[1]], color: COLORS.purple }, // v5
        { matrix: [[1,0],[1,1]], color: COLORS.orange }, // L small
        { matrix: [[0,1],[1,1]], color: COLORS.orange },
        { matrix: [[1,1],[1,0]], color: COLORS.orange },
        { matrix: [[1,1],[0,1]], color: COLORS.orange },
        { matrix: [[1,0,0],[1,0,0],[1,1,1]], color: COLORS.purple }, // L large
        { matrix: [[0,0,1],[0,0,1],[1,1,1]], color: COLORS.purple },
        { matrix: [[1,1,1],[1,0,0],[1,0,0]], color: COLORS.purple },
        { matrix: [[1,1,1],[0,0,1],[0,0,1]], color: COLORS.purple },
        { matrix: [[1,1,1],[0,1,0]], color: COLORS.green }, // T shape
        { matrix: [[0,1,0],[1,1,1]], color: COLORS.green },
        { matrix: [[1,0],[1,1],[1,0]], color: COLORS.green },
        { matrix: [[0,1],[1,1],[0,1]], color: COLORS.green },
    ];

    // --- СОСТОЯНИЕ ИГРЫ ---
    let board = [];
    let trayPieces = [null, null, null];
    let score = 0;
    
    // Элементы DOM
    const boardEl = document.getElementById('board');
    const traySlots = [
        document.getElementById('slot-0'),
        document.getElementById('slot-1'),
        document.getElementById('slot-2')
    ];
    const scoreEl = document.getElementById('score');
    const comboDisplay = document.getElementById('combo-display');
    const gameOverScreen = document.getElementById('game-over');

    // Переменные для перетаскивания
    let dragElement = null;
    let dragPieceIndex = -1;
    let dragOffsetX = 0;
    let dragOffsetY = 0;
    let cellSize = 0;
    let gapSize = 3;
    let isDragging = false;

    // Палитры для каждого цвета блока (светлый/темный/центр/обводки), основанные на вашем фиолетовом референсе
    const BLOCK_PALETTES = {
        'var(--color-orange)': { light: '#FFD5A3', dark: '#C24D00', centerL: '#FA8F28', centerD: '#A13C00', strokeL: '#FFDFB5', strokeD: '#E36500', outline: '#4A1D00' },
        'var(--color-blue)': { light: '#9EE0FF', dark: '#1056BA', centerL: '#47A8F7', centerD: '#0B4291', strokeL: '#B5EAFF', strokeD: '#1E75E0', outline: '#072454' },
        'var(--color-green)': { light: '#C3F79C', dark: '#2F850B', centerL: '#77D938', centerD: '#216107', strokeL: '#D1FAAF', strokeD: '#43AB14', outline: '#113303' },
        'var(--color-purple)': { light: '#F2A8F7', dark: '#7228A5', centerL: '#D175E2', centerD: '#561385', strokeL: '#F8A9FA', strokeD: '#B854E5', outline: '#301B54' },
        'var(--color-yellow)': { light: '#FFF29C', dark: '#D19200', centerL: '#FFCC14', centerD: '#A87200', strokeL: '#FFF5B0', strokeD: '#EBB000', outline: '#593A00' },
        'var(--color-red)': { light: '#FFA8A8', dark: '#A80C0C', centerL: '#F04141', centerD: '#7D0707', strokeL: '#FFBCBC', strokeD: '#CC1414', outline: '#420303' }
    };

    // --- ГЕНЕРАЦИЯ SVG БЛОКА ---
    // Создаем максимально реалистичный 3D блок на основе вашего SVG
    function getBlockSVG(colorStr) {
        // Уникальный ID для градиентов (чтобы разные цвета не смешивались в DOM)
        const id = colorStr.replace(/[^a-zA-Z0-9]/g, '');
        const pal = BLOCK_PALETTES[colorStr] || BLOCK_PALETTES['var(--color-purple)']; // фоллбэк на фиолетовый

        return `
        <svg viewBox="0 0 68 68" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%; display:block; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.3));">
            <!-- 1. Базовый фон с резким диагональным градиентом -->
            <rect width="68" height="68" rx="12" fill="url(#paint0_linear_${id})"/>
            
            <!-- 2. Отзеркаленный слой с прозрачностью для создания 4 граней -->
            <rect opacity="0.5" width="68" height="68" rx="12" transform="matrix(-1 0 0 1 68 0)" fill="url(#paint1_linear_${id})"/>
            
            <!-- 3. Центральная часть с мягким краем (фильтр размытия) -->
            <g filter="url(#filter0_f_${id})">
                <rect x="10" y="10" width="48" height="48" rx="7" fill="url(#paint2_linear_${id})"/>
                <rect x="10" y="10" width="48" height="48" rx="7" stroke="url(#paint_inner_stroke_${id})" stroke-width="1.5"/>
            </g>
            
            <!-- 4. Темная обводка по контуру -->
            <rect x="1" y="1" width="66" height="66" rx="11" stroke="${pal.outline}" stroke-width="2" stroke-opacity="0.8"/>
            
            <!-- 5. Сложный кастомный блик в левом верхнем углу -->
            <path d="M16.8276 9.12817C17.5747 10.3664 16.1728 12.5815 13.6963 14.0757C11.2198 15.5699 8.60661 15.7774 7.8595 14.5392C10 10.5 6.52353 9.99422 9 8.5C11.4765 7.00578 16.0805 7.88993 16.8276 9.12817Z" fill="url(#paint3_radial_${id})"/>
            <path d="M16.8276 9.12817C17.5747 10.3664 16.1728 12.5815 13.6963 14.0757C11.2198 15.5699 8.60661 15.7774 7.8595 14.5392C10 10.5 6.52353 9.99422 9 8.5C11.4765 7.00578 16.0805 7.88993 16.8276 9.12817Z" fill="url(#paint4_radial_${id})"/>
            
            <defs>
                <filter id="filter0_f_${id}" x="8" y="8" width="52" height="52" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
                    <feFlood flood-opacity="0" result="BackgroundImageFix"/>
                    <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
                    <feGaussianBlur stdDeviation="0.5" result="effect1_foregroundBlur_${id}"/>
                </filter>
                
                <!-- Градиент с резким переходом -->
                <linearGradient id="paint0_linear_${id}" x1="0" y1="0" x2="68" y2="68" gradientUnits="userSpaceOnUse">
                    <stop offset="0.490951" stop-color="${pal.light}"/>
                    <stop offset="0.5315" stop-color="${pal.dark}"/>
                </linearGradient>
                <linearGradient id="paint1_linear_${id}" x1="0" y1="0" x2="68" y2="68" gradientUnits="userSpaceOnUse">
                    <stop offset="0.490951" stop-color="${pal.light}"/>
                    <stop offset="0.5315" stop-color="${pal.dark}"/>
                </linearGradient>
                
                <!-- Заливка центральной части: уходит в тень снизу -->
                <linearGradient id="paint2_linear_${id}" x1="34" y1="10" x2="34" y2="58" gradientUnits="userSpaceOnUse">
                    <stop stop-color="${pal.centerL}"/>
                    <stop offset="1" stop-color="${pal.centerD}"/>
                </linearGradient>
                
                <!-- Градиент для внутренней рамки: яркий блик сверху -->
                <linearGradient id="paint_inner_stroke_${id}" x1="34" y1="10" x2="34" y2="58" gradientUnits="userSpaceOnUse">
                    <stop stop-color="${pal.strokeL}"/>
                    <stop offset="0.4" stop-color="${pal.strokeD}" stop-opacity="0"/>
                    <stop offset="1" stop-color="${pal.strokeD}" stop-opacity="0.9"/>
                </linearGradient>
                
                <!-- Радиальные градиенты для блика -->
                <radialGradient id="paint3_radial_${id}" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(12.5 11.5) rotate(123.69) scale(1.80278 5.14854)">
                    <stop stop-color="white"/>
                    <stop offset="1" stop-color="white" stop-opacity="0"/>
                </radialGradient>
                <radialGradient id="paint4_radial_${id}" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(12.5 12) rotate(60.0391) scale(2.39553 4.79105)">
                    <stop stop-color="white"/>
                    <stop offset="1" stop-color="white" stop-opacity="0"/>
                </radialGradient>
            </defs>
        </svg>
        `;
    }

    // --- ИНИЦИАЛИЗАЦИЯ ---
    function initGame() {
        board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));
        score = 0;
        updateScore();
        gameOverScreen.classList.remove('show');
        boardEl.innerHTML = ''; // Очищаем поле для полного перезапуска
        renderBoard();
        fillTray();
    }

    // --- РЕНДЕРИНГ ---
    function renderBoard() {
        // Создаем пустую сетку только если она еще не создана (при старте/рестарте)
        if (boardEl.children.length === 0) {
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    boardEl.appendChild(cell);
                }
            }
        }

        // Обновляем только те клетки, которые изменились (чтобы избежать лишних анимаций)
        for (let r = 0; r < BOARD_SIZE; r++) {
            for (let c = 0; c < BOARD_SIZE; c++) {
                const cell = document.getElementById(`cell-${r}-${c}`);
                const currentColor = cell.dataset.color || null;
                const targetColor = board[r][c];

                // Если цвет фишки в ячейке поменялся (появилась новая или удалилась старая)
                if (currentColor !== targetColor) {
                    cell.innerHTML = ''; // Очищаем старое содержимое
                    
                    if (targetColor) {
                        const blockCont = document.createElement('div');
                        blockCont.className = 'block-svg-container';
                        blockCont.innerHTML = getBlockSVG(targetColor);
                        cell.appendChild(blockCont);
                    }
                    
                    // Сохраняем текущий цвет в атрибут data-color
                    cell.dataset.color = targetColor || '';
                }
            }
        }
    }

    function createShapeHTML(shape) {
        const rows = shape.matrix.length;
        const cols = shape.matrix[0].length;
        
        let html = `<div class="shape" style="grid-template-columns: repeat(${cols}, 1fr); grid-template-rows: repeat(${rows}, 1fr);">`;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                if (shape.matrix[r][c]) {
                    html += `<div class="block">${getBlockSVG(shape.color)}</div>`;
                } else {
                    html += `<div class="block empty"></div>`;
                }
            }
        }
        html += `</div>`;
        return html;
    }

    function fillTray() {
        let emptyCount = 0;
        for (let i = 0; i < 3; i++) {
            if (!trayPieces[i]) {
                emptyCount++;
            }
        }
        
        // Заполняем только если все 3 пустые
        if (emptyCount === 3) {
            for (let i = 0; i < 3; i++) {
                const randomShape = SHAPES_DATA[Math.floor(Math.random() * SHAPES_DATA.length)];
                trayPieces[i] = randomShape;
            }
        }

        renderTray();
        checkGameOver();
    }

    function renderTray() {
        for (let i = 0; i < 3; i++) {
            const slot = traySlots[i];
            slot.innerHTML = '';
            const piece = trayPieces[i];
            
            if (piece) {
                // Масштабируем фигуру в лотке, чтобы она помещалась
                const maxDim = Math.max(piece.matrix.length, piece.matrix[0].length);
                const scale = maxDim > 3 ? 0.6 : 0.8; 
                
                const container = document.createElement('div');
                container.innerHTML = createShapeHTML(piece);
                const shapeEl = container.firstElementChild;
                
                // Фиксированные размеры клеток в лотке
                shapeEl.style.width = `${piece.matrix[0].length * 20}px`;
                shapeEl.style.height = `${piece.matrix.length * 20}px`;
                shapeEl.style.transform = `scale(${scale})`;
                
                slot.appendChild(shapeEl);
                
                // Добавляем обработчики событий
                slot.addEventListener('mousedown', (e) => startDrag(e, i));
                slot.addEventListener('touchstart', (e) => startDrag(e, i), {passive: false});
            }
        }
    }

    // --- ЛОГИКА ПЕРЕТАСКИВАНИЯ ---
    function startDrag(e, index) {
        if (!trayPieces[index] || isDragging) return;
        
        e.preventDefault();
        isDragging = true;
        dragPieceIndex = index;
        
        const piece = trayPieces[index];
        const cellRect = document.querySelector('.cell').getBoundingClientRect();
        cellSize = cellRect.width;
        
        // Создаем клон для перетаскивания
        dragElement = document.createElement('div');
        dragElement.className = 'drag-clone';
        dragElement.innerHTML = createShapeHTML(piece);
        
        const shapeEl = dragElement.firstElementChild;
        // Задаем реальный размер блоков как на доске
        shapeEl.style.width = `${piece.matrix[0].length * cellSize + (piece.matrix[0].length - 1) * gapSize}px`;
        shapeEl.style.height = `${piece.matrix.length * cellSize + (piece.matrix.length - 1) * gapSize}px`;
        
        document.body.appendChild(dragElement);
        
        // Прячем оригинал в лотке
        traySlots[index].style.opacity = '0';

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        // Позиционируем клон так, чтобы центр фигуры был немного ВЫШЕ пальца
        dragOffsetX = shapeEl.offsetWidth / 2;
        dragOffsetY = shapeEl.offsetHeight + 40; // Смещение вверх на 40px

        moveDrag(clientX, clientY);

        document.addEventListener('mousemove', onDragMove);
        document.addEventListener('touchmove', onDragMove, {passive: false});
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);
    }

    function onDragMove(e) {
        if (!isDragging) return;
        e.preventDefault(); // Предотвращаем скролл
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        moveDrag(clientX, clientY);
        updatePreview();
    }

    function moveDrag(x, y) {
        if (dragElement) {
            dragElement.style.left = `${x - dragOffsetX}px`;
            dragElement.style.top = `${y - dragOffsetY}px`;
        }
    }

    function updatePreview() {
        clearPreview();
        const coords = getBoardCoordinates();
        if (coords && canPlace(trayPieces[dragPieceIndex], coords.r, coords.c)) {
            drawPreview(trayPieces[dragPieceIndex], coords.r, coords.c);
        }
    }

    function getBoardCoordinates() {
        if (!dragElement) return null;
        
        const rect = dragElement.getBoundingClientRect();
        const boardRect = boardEl.getBoundingClientRect();
        
        // Вычисляем относительную позицию (левый верхний угол фигуры относительно доски)
        const relX = rect.left - boardRect.left;
        const relY = rect.top - boardRect.top;
        
        // Переводим в координаты сетки
        const c = Math.round(relX / (cellSize + gapSize));
        const r = Math.round(relY / (cellSize + gapSize));
        
        return {r, c};
    }

    function clearPreview() {
        document.querySelectorAll('.cell.preview').forEach(el => el.classList.remove('preview'));
    }

    function drawPreview(shape, startR, startC) {
        for (let r = 0; r < shape.matrix.length; r++) {
            for (let c = 0; c < shape.matrix[0].length; c++) {
                if (shape.matrix[r][c]) {
                    const cell = document.getElementById(`cell-${startR + r}-${startC + c}`);
                    if (cell) cell.classList.add('preview');
                }
            }
        }
    }

    function endDrag(e) {
        if (!isDragging) return;
        
        document.removeEventListener('mousemove', onDragMove);
        document.removeEventListener('touchmove', onDragMove);
        document.removeEventListener('mouseup', endDrag);
        document.removeEventListener('touchend', endDrag);
        
        const coords = getBoardCoordinates();
        const piece = trayPieces[dragPieceIndex];
        
        let placed = false;
        if (coords && canPlace(piece, coords.r, coords.c)) {
            placeShape(piece, coords.r, coords.c);
            trayPieces[dragPieceIndex] = null;
            placed = true;
        }
        
        // Возвращаем видимость лотка и удаляем клон
        traySlots[dragPieceIndex].style.opacity = '1';
        if (dragElement) {
            dragElement.remove();
            dragElement = null;
        }
        
        clearPreview();
        isDragging = false;
        dragPieceIndex = -1;

        if (placed) {
            renderBoard();
            const linesCleared = checkLines();
            if (linesCleared === 0) {
                renderTray();
                fillTray();
            }
        }
    }

    // --- ЛОГИКА ИГРЫ ---
    function canPlace(shape, startR, startC) {
        for (let r = 0; r < shape.matrix.length; r++) {
            for (let c = 0; c < shape.matrix[0].length; c++) {
                if (shape.matrix[r][c]) {
                    const boardR = startR + r;
                    const boardC = startC + c;
                    // Проверка выхода за границы
                    if (boardR < 0 || boardR >= BOARD_SIZE || boardC < 0 || boardC >= BOARD_SIZE) {
                        return false;
                    }
                    // Проверка занятости клетки
                    if (board[boardR][boardC] !== null) {
                        return false;
                    }
                }
            }
        }
        return true;
    }

    function placeShape(shape, startR, startC) {
        let blocksPlaced = 0;
        for (let r = 0; r < shape.matrix.length; r++) {
            for (let c = 0; c < shape.matrix[0].length; c++) {
                if (shape.matrix[r][c]) {
                    board[startR + r][startC + c] = shape.color;
                    blocksPlaced++;
                }
            }
        }
        score += blocksPlaced; // Базовые очки за выставление
        updateScore();
    }

    function checkLines() {
        const rowsToClear = [];
        const colsToClear = [];

        // Ищем полные строки
        for (let r = 0; r < BOARD_SIZE; r++) {
            if (board[r].every(cell => cell !== null)) {
                rowsToClear.push(r);
            }
        }

        // Ищем полные столбцы
        for (let c = 0; c < BOARD_SIZE; c++) {
            let colFull = true;
            for (let r = 0; r < BOARD_SIZE; r++) {
                if (board[r][c] === null) {
                    colFull = false;
                    break;
                }
            }
            if (colFull) colsToClear.push(c);
        }

        const totalLines = rowsToClear.length + colsToClear.length;

        if (totalLines > 0) {
            // Анимация и удаление
            const cellsToClear = new Set();
            
            rowsToClear.forEach(r => {
                for(let c=0; c<BOARD_SIZE; c++) cellsToClear.add(`${r},${c}`);
            });
            colsToClear.forEach(c => {
                for(let r=0; r<BOARD_SIZE; r++) cellsToClear.add(`${r},${c}`);
            });

            // Воспроизводим анимацию
            cellsToClear.forEach(coord => {
                const [r, c] = coord.split(',');
                const cell = document.getElementById(`cell-${r}-${c}`);
                const colorStr = board[r][c];
                
                // Создаем частицы от центра удаляемого блока
                const rect = cell.getBoundingClientRect();
                createParticles(rect.left + rect.width / 2, rect.top + rect.height / 2, colorStr);

                const svgCont = cell.querySelector('.block-svg-container');
                if (svgCont) {
                    svgCont.classList.add('clearing');
                }
            });

            // Показываем комбо-текст
            if (totalLines > 1) {
                comboDisplay.textContent = `Комбо x${totalLines} !`;
                comboDisplay.style.animation = 'none';
                void comboDisplay.offsetWidth; // Триггер рефлоу для перезапуска анимации
                comboDisplay.style.animation = 'floatUp 1.5s ease-out forwards';
            }

            // Очки за линии
            score += totalLines * 100;
            if (totalLines > 1) score += (totalLines - 1) * 50; // Бонус за комбо
            updateScore();

            // Ждем окончания анимации, затем очищаем массив и рендерим
            setTimeout(() => {
                cellsToClear.forEach(coord => {
                    const [r, c] = coord.split(',');
                    board[r][c] = null;
                });
                renderBoard();
                renderTray();
                fillTray();
            }, 300); // 300ms = время анимации
        }

        return totalLines;
    }

    function createParticles(x, y, colorStr) {
        const pal = BLOCK_PALETTES[colorStr] || BLOCK_PALETTES['var(--color-purple)'];
        const color = pal.light; // Используем светлый оттенок из нашей палитры для эффекта ярких осколков
        
        // Создаем 6-8 частиц для каждого взорванного блока
        for (let i = 0; i < 7; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.backgroundColor = color;
            p.style.boxShadow = `0 0 6px ${color}`;
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            
            // Рандомный вектор разлета осколков
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 60 + 30; // Дальность полета
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance;
            const rot = Math.random() * 360 + 'deg'; // Вращение осколка
            
            p.style.setProperty('--tx', `calc(-50% + ${tx}px)`);
            p.style.setProperty('--ty', `calc(-50% + ${ty}px)`);
            p.style.setProperty('--rot', rot);
            
            document.body.appendChild(p);
            
            // Удаляем частицы из DOM после окончания анимации
            setTimeout(() => p.remove(), 500);
        }
    }

    function updateScore() {
        // Форматирование числа с запятыми
        scoreEl.textContent = score.toLocaleString('en-US');
    }

    function checkGameOver() {
        // Проверяем, есть ли хотя бы одно место для любой из оставшихся фигур
        for (let i = 0; i < 3; i++) {
            const piece = trayPieces[i];
            if (!piece) continue;

            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (canPlace(piece, r, c)) {
                        return; // Нашли возможное место, игра продолжается
                    }
                }
            }
        }
        
        // Если места нет
        setTimeout(() => {
            gameOverScreen.classList.add('show');
        }, 500);
    }

    // Запуск игры
    window.onload = initGame;

    // Предотвращаем скролл при касании лотка (глобально для ios)
    document.addEventListener('touchmove', function(e) {
        if(isDragging) e.preventDefault();
    }, { passive: false });

</script>
