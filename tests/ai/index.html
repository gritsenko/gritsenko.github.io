            ideaDisplay.classList.remove('hidden');

            void ideaDisplay.offsetWidth; 
            ideaDisplay.classList.add('fade-in');

            startupName.innerText = name;
            startupDesc.innerText = randomDesc;

            const text = `🚀 Идея стартапа: ${startupName.innerText}\n📝 Описание: ${startupDesc.innerText}\n\nСгенерировано в Startup Gen`;

            document.body.appendChild(textArea);
            textArea.select();

            document.body.removeChild(textArea);
